<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAN TRU FREE | FAMILY TRACKER</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --bg: #050505;
            --accent: #ff4d00;
            --panel: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 77, 0, 0.25);
            --home: #0084ff; --work: #ff4d00; --personal: #00ff62;
        }

        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; background: radial-gradient(circle at top, #1a0f0a 0%, #050505 100%); }

        .main-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; letter-spacing: clamp(10px, 2vw, 20px); text-transform: uppercase; margin: 0;
            background: linear-gradient(180deg, #fff 0%, #777 50%, #333 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 77, 0, 0.4)); text-align: center;
        }

        .date-widget { color: var(--accent); letter-spacing: 5px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; margin-top: 10px; }

        .rings-container { display: flex; gap: clamp(20px, 4vw, 50px); margin: 30px 0; justify-content: center; }
        .ring-box { text-align: center; position: relative; }
        .ring-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; }
        .ring-value { position: absolute; top: 35px; left: 50%; transform: translate(-50%, -50%); font-size: 0.9rem; font-weight: 900; color: #fff; }
        .progress-ring { width: 70px; height: 70px; transform: rotate(-90deg); }
        .progress-ring circle { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

        .input-panel {
            background: var(--panel); backdrop-filter: blur(30px); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 20px; display: flex; flex-wrap: wrap; gap: 12px; width: 100%; max-width: 1100px; margin-bottom: 40px;
        }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; outline: none; flex: 1; min-width: 150px; font-size: 0.9rem; }
        .add-btn { background: var(--accent); color: #fff; border: none; padding: 0 40px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; min-height: 45px; }

        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; width: 100%; max-width: 1600px; }
        @media (max-width: 1100px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .week-grid { grid-template-columns: 1fr; } }

        .day-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 15px; min-height: 450px; cursor: pointer; transition: 0.4s; position: relative; }
        .day-card.selected { border-color: #fff; background: rgba(50,50,50,0.5); }
        .day-card.today { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 77, 0, 0.2); }
        .day-card.today::after { content: 'TODAY'; position: absolute; top: 15px; right: 15px; font-size: 0.6rem; color: var(--accent); font-weight: 900; letter-spacing: 1px; }
        
        .day-title { color: var(--accent); font-weight: 900; font-size: 0.85rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; text-transform: uppercase; }

        .task { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 3px solid var(--accent); font-size: 0.85rem; transition: 0.2s; }
        .task:hover { background: rgba(255,255,255,0.07); transform: translateX(5px); }
        .task span { flex: 1; cursor: pointer; }
        .task.cat-Дом { border-left-color: var(--home); }
        .task.cat-Работа { border-left-color: var(--work); }
        .task.cat-Личное { border-left-color: var(--personal); }
        .task.urgent { border-left-color: #ff0000; font-weight: bold; background: rgba(255,0,0,0.05); }
        .del-x { color: #555; cursor: pointer; font-weight: bold; margin-left: 10px; }

        summary { color: #333; font-weight: 800; font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; text-align: center; margin: 50px 0; }
        #archive { display: flex; flex-direction: column; gap: 5px; opacity: 0.4; padding-bottom: 100px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="header-container">
        <h1 class="main-title">VAN TRU FREE</h1>
        <div id="currentDate" class="date-widget"></div>
    </div>

    <div class="rings-container">
        <div class="ring-box">
            <svg class="progress-ring" id="ring-home"><circle stroke="rgba(255,255,255,0.03)" cx="35" cy="35" r="30" fill="none" stroke-width="5""")/>><circle class="ring-active" cx="35" cy="35" r="30" stroke="var(--home)" stroke-dasharray="188.5" stroke-dashoffset="188.5" fill="none" stroke-width="5""")/>></svg>
            <div class="ring-value" id="val-home">0/0</div><div class="ring-label">Дом</div>
        </div>
        <div class="ring-box">
            <svg class="progress-ring" id="ring-work"><circle stroke="rgba(255,255,255,0.03)" cx="35" cy="35" r="30" fill="none" stroke-width="5""")/>><circle class="ring-active" cx="35" cy="35" r="30" stroke="var(--work)" stroke-dasharray="188.5" stroke-dashoffset="188.5" fill="none" stroke-width="5""")/>></svg>
            <div class="ring-value" id="val-work">0/0</div><div class="ring-label">Работа</div>
        </div>
        <div class="ring-box">
            <svg class="progress-ring" id="ring-personal"><circle stroke="rgba(255,255,255,0.03)" cx="35" cy="35" r="30" fill="none" stroke-width="5""")/>><circle class="ring-active" cx="35" cy="35" r="30" stroke="var(--personal)" stroke-dasharray="188.5" stroke-dashoffset="188.5" fill="none" stroke-width="5""")/>></svg>
            <div class="ring-value" id="val-personal">0/0</div><div class="ring-label">Личное</div>
        </div>
    </div>

    <div class="input-panel">
        <input type="text" id="taskName" placeholder="Какая миссия на сегодня?" onkeydown="if(event.key==='Enter') addTask()">
        <select id="taskDay">
            <option value="mon">Понедельник</option><option value="tue">Вторник</option><option value="wed">Среда</option>
            <option value="thu">Четверг</option><option value="fri">Пятница</option><option value="sat">Суббота</option><option value="sun">Воскресенье</option>
        </select>
        <select id="taskCat">
            <option value="Дом">🏠 Дом</option><option value="Работа">💼 Работа</option><option value="Личное">✨ Личное</option>
        </select>
        <select id="taskPri">
            <option value="normal">Обычный</option><option value="urgent">🔥 СРОЧНО</option>
        </select>
        <button class="add-btn" onclick="addTask()">ADD MISSION</button>
    </div>

    <div class="week-grid" id="grid"></div>

    <details style="width: 100%; max-width: 1100px;"><summary>АРХИВ ВЫПОЛНЕННЫХ</summary><div id="archive"></div></details>

    <script>
        // --- ДАТА И ЧАСТИЦЫ ---
        function updateDate() {
            const now = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('ru-RU', options);
            
            // Авто-выбор текущего дня в селекторе
            const daysMap = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const todayId = daysMap[now.getDay()];
            document.getElementById('taskDay').value = todayId;
            return todayId;
        }
        const currentDayId = updateDate();

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 0.5; this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25;
                this.alpha = Math.random() * 0.6;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.init();
            }
            draw() { ctx.fillStyle = `rgba(255, 77, 0, ${this.alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 500; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        // --- ЛОГИКА ---
        let tasks = JSON.parse(localStorage.getItem('vt_ultra_vFinal_Date')) || [];
        const daysShort = ['mon','tue','wed','thu','fri','sat','sun'];

        function addTask() {
            const title = document.getElementById('taskName').value;
            if(!title) return;
            tasks.push({ id: Date.now(), title, day: document.getElementById('taskDay').value, cat: document.getElementById('taskCat').value, pri: document.getElementById('taskPri').value, done: false });
            document.getElementById('taskName').value = '';
            render();
        }

        function toggleTask(e, id) {
            e.stopPropagation();
            tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
            render();
        }

        function deleteTask(e, id) {
            e.stopPropagation();
            if(confirm('Удалить эту задачу?')) { tasks = tasks.filter(t => t.id !== id); render(); }
        }

        function selectDay(dayId) {
            document.getElementById('taskDay').value = dayId;
            render();
        }

        function render() {
            localStorage.setItem('vt_ultra_vFinal_Date', JSON.stringify(tasks));
            const names = ['ПОНЕДЕЛЬНИК','ВТОРНИК','СРЕДА','ЧЕТВЕРГ','ПЯТНИЦА','СУББОТА','ВОСКРЕСЕНЬЕ'];
            const currentSelectedDay = document.getElementById('taskDay').value;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            daysShort.forEach((day, i) => {
                const isToday = day === currentDayId;
                const card = document.createElement('div');
                card.className = `day-card ${day === currentSelectedDay ? 'selected' : ''} ${isToday ? 'today' : ''}`;
                card.onclick = () => selectDay(day);
                card.innerHTML = `<div class="day-title">${names[i]}</div>`;
                
                tasks.filter(t => t.day === day && !t.done).forEach(t => {
                    const d = document.createElement('div');
                    d.className = `task ${t.pri} cat-${t.cat}`;
                    d.onclick = (e) => toggleTask(e, t.id);
                    d.innerHTML = `<span>${t.title}</span><div class="del-x" onclick="deleteTask(event, ${t.id})">×</div>`;
                    card.appendChild(d);
                });
                grid.appendChild(card);
            });

            document.getElementById('archive').innerHTML = tasks.filter(t => t.done).map(t => 
                `<div class="task cat-${t.cat}" style="opacity:0.6" onclick="toggleTask(event, ${t.id})"><span>${t.title}</span><div class="del-x" onclick="deleteTask(event, ${t.id})">×</div></div>`
            ).join('');
            
            ['Дом', 'Работа', 'Личное'].forEach(cat => {
                const cTasks = tasks.filter(t => t.cat === cat);
                const doneCount = cTasks.filter(t => t.done).length;
                const total = cTasks.length;
                const ring = document.querySelector(`#ring-${cat === 'Дом' ? 'home' : cat === 'Работа' ? 'work' : 'personal'} .ring-active`);
                ring.style.strokeDashoffset = 188.5 * (1 - (total ? doneCount/total : 0));
                document.getElementById(`val-${cat === 'Дом' ? 'home' : cat === 'Работа' ? 'work' : 'personal'}`).innerText = `${doneCount}/${total}`;
            });
        }
        render();
    </script>
</body>
</html>
