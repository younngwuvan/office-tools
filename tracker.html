<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAN TRU FREE | FAMILY TRACKER</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --bg: #050505;
            --text: #e0e0e0;
            --muted: #555;
            --accent: #ff4d00;
            --panel: rgba(20, 20, 20, 0.7);
            --panel-solid: rgba(20, 20, 20, 0.92);
            --border: rgba(255, 77, 0, 0.25);
            --input-bg: #000;
            --input-text: #fff;
            --task-bg: rgba(255,255,255,0.03);
            --task-hover: rgba(255,255,255,0.07);
            --selected-bg: rgba(50,50,50,0.5);
            --shadow: 0 15px 50px rgba(0,0,0,0.5);
            --title-grad: linear-gradient(180deg, #fff 0%, #888 50%, #222 100%);
            --title-shadow: drop-shadow(0 0 30px rgba(255, 77, 0, 0.5));
            --bg-grad: radial-gradient(circle at top, #1a0f0a 0%, #050505 100%);
            --home: #0084ff;
            --work: #ff4d00;
            --personal: #00ff62;
            --danger: #ff3b30;
        }

        body[data-theme="light"] {
            --bg: #f6f7f9;
            --text: #161616;
            --muted: #6d6d6d;
            --accent: #ff5a1f;
            --panel: rgba(255, 255, 255, 0.74);
            --panel-solid: rgba(255, 255, 255, 0.92);
            --border: rgba(255, 90, 31, 0.18);
            --input-bg: rgba(255, 255, 255, 0.94);
            --input-text: #111;
            --task-bg: rgba(0,0,0,0.035);
            --task-hover: rgba(0,0,0,0.06);
            --selected-bg: rgba(0,0,0,0.045);
            --shadow: 0 15px 45px rgba(0,0,0,0.10);
            --title-grad: linear-gradient(180deg, #111 0%, #5b5b5b 50%, #a1a1a1 100%);
            --title-shadow: drop-shadow(0 0 18px rgba(255, 90, 31, 0.18));
            --bg-grad: radial-gradient(circle at top, #ffe8dc 0%, #f6f7f9 100%);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            background: var(--bg-grad);
            transition: background 0.35s ease;
        }

        .header-container {
            text-align: center;
            width: 100%;
            padding-top: clamp(60px, 10vh, 120px);
            margin-bottom: 20px;
            animation: fadeInDown 1.2s ease;
            position: relative;
        }

        .main-title {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900;
            letter-spacing: clamp(10px, 4vw, 25px);
            text-transform: uppercase;
            margin: 0;
            background: var(--title-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: var(--title-shadow);
            transition: filter 0.35s ease;
        }

        .sub-title {
            color: var(--accent);
            letter-spacing: clamp(8px, 2vw, 15px);
            font-weight: 900;
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            text-transform: uppercase;
            margin-top: 10px;
            display: block;
            opacity: 0.9;
        }

        .hero-clock {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 0;
            font-weight: 900;
            letter-spacing: 0.16em;
            filter: drop-shadow(0 0 24px rgba(255, 77, 0, 0.22));
            animation: fadeInDown 1.2s ease;
            user-select: none;
        }

        .clock-main {
            font-size: clamp(2.2rem, 6vw, 4.4rem);
            line-height: 1;
            background: linear-gradient(180deg, #ffffff 0%, #cfcfcf 35%, #7f7f7f 65%, #2a2a2a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .clock-seconds {
            font-size: clamp(1rem, 2.4vw, 1.8rem);
            line-height: 1;
            color: var(--accent);
            margin-left: 6px;
            letter-spacing: 0.08em;
            text-shadow: 0 0 14px rgba(255, 77, 0, 0.35);
        }

        .date-widget {
            color: var(--muted);
            letter-spacing: 3px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 15px;
        }

        body[data-theme="light"] .hero-clock {
            filter: drop-shadow(0 0 18px rgba(255, 90, 31, 0.18));
        }

        body[data-theme="light"] .clock-main {
            background: linear-gradient(180deg, #171717 0%, #5c5c5c 45%, #a7a7a7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .theme-bar,
        .utility-bar {
            width: 90%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .theme-switch {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-solid);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            user-select: none;
        }

        .theme-switch-label {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            min-width: 92px;
            text-align: right;
        }

        .theme-switch input { display: none; }

        .theme-slider {
            width: 64px;
            height: 34px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255,77,0,0.18), rgba(255,255,255,0.08));
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            transition: 0.3s ease;
            flex-shrink: 0;
        }

        .theme-slider::before {
            content: '🌙';
            position: absolute;
            top: 50%;
            left: 4px;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            box-shadow: 0 3px 10px rgba(0,0,0,0.35);
            transition: 0.3s ease;
        }

        body[data-theme="light"] .theme-slider {
            background: linear-gradient(90deg, rgba(255,190,120,0.55), rgba(255,90,31,0.16));
        }

        body[data-theme="light"] .theme-slider::before {
            content: '☀';
            left: 34px;
            background: #fff;
            color: #ff6a00;
            box-shadow: 0 3px 10px rgba(255,90,31,0.22);
        }

        .filter-group,
        .week-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-solid);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .filter-label,
        .week-progress-label {
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .filter-btn,
        .archive-clear-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .filter-btn:hover,
        .archive-clear-btn:hover {
            transform: translateY(-1px);
            background: var(--task-hover);
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
        }

        .week-progress-value {
            font-weight: 900;
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 1px;
        }

        .rings-container {
            display: flex;
            gap: clamp(15px, 5vw, 50px);
            margin: 22px 0 30px;
            justify-content: center;
            width: 100%;
        }

        .ring-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 80px;
        }

        .ring-label {
            font-size: 0.6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            font-weight: 700;
        }

        .ring-inner {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-value {
            position: absolute;
            font-size: 1rem;
            font-weight: 900;
            color: var(--text);
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .progress-ring {
            width: 80px;
            height: 80px;
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        @media (max-width: 700px) {
            .ring-box, .ring-inner, .progress-ring {
                width: 65px;
                height: 65px;
            }

            .ring-value { font-size: 0.8rem; }

            .theme-bar,
            .utility-bar {
                justify-content: center;
            }

            .theme-switch-label { min-width: auto; }

            .filter-group,
            .week-progress {
                justify-content: center;
            }

            .hero-clock {
                margin-top: 14px;
                letter-spacing: 0.1em;
            }

            .clock-seconds {
                margin-left: 4px;
            }
        }

        .input-panel {
            background: var(--panel);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 1100px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        @media (min-width: 1100px) {
            .input-panel {
                flex-direction: row;
                padding: 15px 25px;
                border-radius: 20px;
            }

            input, select { min-width: 150px; }
            body { padding-bottom: 50px; }
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--input-text);
            padding: 12px;
            border-radius: 10px;
            outline: none;
            flex: 1;
            font-size: 1rem;
            transition: 0.3s ease;
        }

        input::placeholder { color: var(--muted); }

        .add-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            box-shadow: 0 0 30px rgba(255, 77, 0, 0.35);
            transform: translateY(-2px);
        }

        .week-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 95%;
            max-width: 1600px;
        }

        @media (min-width: 1100px) {
            .week-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 15px;
            }

            .day-card { min-height: 450px !important; }
        }

        .day-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            min-height: 100px;
            cursor: pointer;
            transition: 0.35s;
            position: relative;
            animation: driftIn 0.8s ease both;
            backdrop-filter: blur(24px);
        }

        .day-card.selected {
            border-color: var(--text);
            background: var(--selected-bg);
        }

        .day-card.today {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 77, 0, 0.14);
        }

        .day-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .day-title {
            color: var(--accent);
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
        }

        .day-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .today-badge {
            font-size: 0.56rem;
            color: var(--accent);
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--border);
            padding: 3px 6px;
            border-radius: 999px;
            line-height: 1;
            white-space: nowrap;
        }

        .day-count {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 1px;
            white-space: nowrap;
            text-align: right;
        }

        .task {
            background: var(--task-bg);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
            font-size: 0.95rem;
            color: var(--text);
            transition: 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
            gap: 10px;
        }

        .task:hover {
            background: var(--task-hover);
            transform: translateX(5px);
        }

        .task.closing {
            opacity: 0;
            transform: translateX(18px) scale(0.98);
        }

        .task-title {
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }

        .task.cat-Дом { border-left-color: var(--home); }
        .task.cat-Работа { border-left-color: var(--work); }
        .task.cat-Личное { border-left-color: var(--personal); }

        .task.urgent {
            border-left-color: #ff0000;
            font-weight: bold;
            background: rgba(255,0,0,0.06);
        }

        body[data-theme="light"] .task.urgent {
            background: rgba(255, 0, 0, 0.08);
        }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .edit-btn {
            color: var(--muted);
            cursor: pointer;
            font-weight: 900;
            font-size: 0.95rem;
            line-height: 1;
            border: 1px solid var(--border);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s ease;
            background: transparent;
            user-select: none;
        }

        .edit-btn:hover {
            color: var(--text);
            background: var(--task-hover);
            transform: scale(1.05);
        }

        .del-x {
            color: var(--muted);
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
            user-select: none;
        }

        @media (hover: hover) {
            .edit-btn { opacity: 0.72; }
            .del-x { opacity: 0.72; }

            .task:hover .edit-btn,
            .task:hover .del-x {
                opacity: 1;
            }
        }

        .archive-header {
            display: flex;
            justify-content: flex-end;
            margin: 12px 0;
        }

        summary {
            color: var(--muted);
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 3px;
            cursor: pointer;
            text-align: center;
            margin-top: 50px;
        }

        #archive {
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0.65;
            padding-bottom: 100px;
            width: 95%;
        }

        @keyframes driftIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="header-container">
        <h1 class="main-title">VAN TRU FREE</h1>
        <span class="sub-title">FAMILY TRACKER</span>
        <div class="hero-clock" id="heroClock">
            <span class="clock-main">00:00</span><span class="clock-seconds">:00</span>
        </div>
        <div id="currentDate" class="date-widget"></div>
    </div>

    <div class="theme-bar">
        <div class="week-progress">
            <span class="week-progress-label">Week Progress</span>
            <span class="week-progress-value" id="weekProgressValue">0%</span>
        </div>

        <label class="theme-switch">
            <span class="theme-switch-label" id="themeLabel">DARK MODE</span>
            <input type="checkbox" id="themeToggle" />
            <span class="theme-slider"></span>
        </label>
    </div>

    <div class="utility-bar">
        <div class="filter-group" id="filterGroup">
            <span class="filter-label">Filter</span>
            <button class="filter-btn active" data-filter="all" type="button">Все</button>
            <button class="filter-btn" data-filter="Дом" type="button">Дом</button>
            <button class="filter-btn" data-filter="Работа" type="button">Работа</button>
            <button class="filter-btn" data-filter="Личное" type="button">Личное</button>
        </div>
    </div>

    <div class="rings-container">
        <div class="ring-box">
            <div class="ring-inner">
                <svg class="progress-ring" id="ring-home" viewBox="0 0 80 80">
                    <circle stroke="rgba(255,255,255,0.03)" cx="40" cy="40" r="34"></circle>
                    <circle class="ring-active" cx="40" cy="40" r="34" stroke="var(--home)" stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
                </svg>
                <div class="ring-value" id="val-home">0/0</div>
            </div>
            <div class="ring-label">Дом</div>
        </div>

        <div class="ring-box">
            <div class="ring-inner">
                <svg class="progress-ring" id="ring-work" viewBox="0 0 80 80">
                    <circle stroke="rgba(255,255,255,0.03)" cx="40" cy="40" r="34"></circle>
                    <circle class="ring-active" cx="40" cy="40" r="34" stroke="var(--work)" stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
                </svg>
                <div class="ring-value" id="val-work">0/0</div>
            </div>
            <div class="ring-label">Работа</div>
        </div>

        <div class="ring-box">
            <div class="ring-inner">
                <svg class="progress-ring" id="ring-personal" viewBox="0 0 80 80">
                    <circle stroke="rgba(255,255,255,0.03)" cx="40" cy="40" r="34"></circle>
                    <circle class="ring-active" cx="40" cy="40" r="34" stroke="var(--personal)" stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
                </svg>
                <div class="ring-value" id="val-personal">0/0</div>
            </div>
            <div class="ring-label">Личное</div>
        </div>
    </div>

    <div class="input-panel">
        <input type="text" id="taskName" placeholder="Какая миссия на сегодня?" onkeydown="if(event.key==='Enter') addTask()" />
        <select id="taskDay">
            <option value="mon">Понедельник</option>
            <option value="tue">Вторник</option>
            <option value="wed">Среда</option>
            <option value="thu">Четверг</option>
            <option value="fri">Пятница</option>
            <option value="sat">Суббота</option>
            <option value="sun">Воскресенье</option>
        </select>
        <select id="taskCat">
            <option value="Дом">🏠 Дом</option>
            <option value="Работа">💼 Работа</option>
            <option value="Личное">✨ Личное</option>
        </select>
        <select id="taskPri">
            <option value="normal">Обычный</option>
            <option value="urgent">🔥 СРОЧНО</option>
        </select>
        <button class="add-btn" onclick="addTask()">ADD MISSION</button>
    </div>

    <div class="week-grid" id="grid"></div>

    <details style="width: 95%;">
        <summary>АРХИВ ВЫПОЛНЕННЫХ</summary>
        <div class="archive-header">
            <button class="archive-clear-btn" type="button" onclick="clearArchive()">Очистить архив</button>
        </div>
        <div id="archive"></div>
    </details>

    <script>
        let currentDayId = '';
        let activeFilter = 'all';
        let tasks = JSON.parse(localStorage.getItem('vt_v_final_ultra_v3_safe')) || [];

        const daysShort = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        const dayNames = ['ПОНЕДЕЛЬНИК', 'ВТОРНИК', 'СРЕДА', 'ЧЕТВЕРГ', 'ПЯТНИЦА', 'СУББОТА', 'ВОСКРЕСЕНЬЕ'];

        const taskInput = document.getElementById('taskName');
        const taskDaySelect = document.getElementById('taskDay');

        let longPressTimer = null;
        let longPressTriggered = false;

        function updateDate() {
            const now = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('ru-RU', options);
            const daysMap = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            currentDayId = daysMap[now.getDay()];
            taskDaySelect.value = currentDayId;
        }

        function updateHeroClock() {
            const clock = document.getElementById('heroClock');
            if (!clock) return;

            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            clock.innerHTML = `
                <span class="clock-main">${hh}:${mm}</span><span class="clock-seconds">:${ss}</span>
            `;
        }

        updateDate();
        updateHeroClock();
        setInterval(() => {
            updateDate();
            updateHeroClock();
        }, 1000);

        const themeToggle = document.getElementById('themeToggle');
        const themeLabel = document.getElementById('themeLabel');
        const systemThemeQuery = window.matchMedia('(prefers-color-scheme: light)');

        function getPreferredTheme() {
            const savedTheme = localStorage.getItem('vt_theme');
            if (savedTheme === 'dark' || savedTheme === 'light') return savedTheme;
            return systemThemeQuery.matches ? 'light' : 'dark';
        }

        function applyTheme(theme, persist = false) {
            document.body.setAttribute('data-theme', theme);
            themeToggle.checked = theme === 'light';
            themeLabel.innerText = theme === 'light' ? 'DAY MODE' : 'DARK MODE';
            if (persist) localStorage.setItem('vt_theme', theme);
        }

        function initTheme() {
            applyTheme(getPreferredTheme(), false);
        }

        themeToggle.addEventListener('change', () => {
            const newTheme = themeToggle.checked ? 'light' : 'dark';
            applyTheme(newTheme, true);
        });

        systemThemeQuery.addEventListener('change', (e) => {
            const savedTheme = localStorage.getItem('vt_theme');
            if (!savedTheme) {
                applyTheme(e.matches ? 'light' : 'dark', false);
            }
        });

        initTheme();

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.alpha = Math.random() * 0.7;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) {
                    this.init();
                }
            }

            draw() {
                const theme = document.body.getAttribute('data-theme') || 'dark';
                ctx.fillStyle = theme === 'light'
                    ? `rgba(255, 110, 40, ${this.alpha * 0.25})`
                    : `rgba(255, 77, 0, ${this.alpha})`;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 500; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p) => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function saveTasks() {
            localStorage.setItem('vt_v_final_ultra_v3_safe', JSON.stringify(tasks));
        }

        function passesFilter(task) {
            return activeFilter === 'all' || task.cat === activeFilter;
        }

        function focusTaskInput() {
            taskInput.focus();
        }

        function addTask() {
            const title = taskInput.value.trim();
            if (!title) return;

            tasks.push({
                id: Date.now(),
                title,
                day: document.getElementById('taskDay').value,
                cat: document.getElementById('taskCat').value,
                pri: document.getElementById('taskPri').value,
                done: false
            });

            taskInput.value = '';
            render();
            focusTaskInput();
        }

        function toggleTask(e, id) {
            e.stopPropagation();

            const taskEl = e.currentTarget;
            if (taskEl && taskEl.classList) {
                taskEl.classList.add('closing');
            }

            setTimeout(() => {
                tasks = tasks.map((t) => t.id === id ? { ...t, done: !t.done } : t);
                render();
            }, 180);
        }

        function handleTaskClick(e, id) {
            if (longPressTriggered) {
                longPressTriggered = false;
                return;
            }
            toggleTask(e, id);
        }

        function deleteTask(e, id) {
            e.stopPropagation();
            if (confirm('Удалить?')) {
                tasks = tasks.filter((t) => t.id !== id);
                render();
            }
        }

        function editTask(e, id) {
            e.stopPropagation();
            cancelLongPress();

            const task = tasks.find((t) => t.id === id);
            if (!task) return;

            const updated = prompt('Редактировать задачу:', task.title);
            if (updated === null) return;

            const clean = updated.trim();
            if (!clean) return;

            tasks = tasks.map((t) => t.id === id ? { ...t, title: clean } : t);
            render();
        }

        function startLongPress(e, id) {
            cancelLongPress();
            longPressTriggered = false;

            longPressTimer = setTimeout(() => {
                longPressTriggered = true;
                editTask(e, id);
            }, 550);
        }

        function cancelLongPress() {
            clearTimeout(longPressTimer);
        }

        function selectDay(dayId) {
            taskDaySelect.value = dayId;
            render();
        }

        function clearArchive() {
            const doneCount = tasks.filter((t) => t.done).length;
            if (!doneCount) {
                alert('Архив уже пуст.');
                return;
            }

            if (!confirm(`Удалить все выполненные задачи (${doneCount})?`)) return;
            tasks = tasks.filter((t) => !t.done);
            render();
        }

        function setFilter(filterValue) {
            activeFilter = filterValue;
            document.querySelectorAll('.filter-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.filter === filterValue);
            });
            render();
        }

        document.querySelectorAll('.filter-btn').forEach((btn) => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });

        function updateWeekProgress() {
            const total = tasks.length;
            const done = tasks.filter((t) => t.done).length;
            const percent = total ? Math.round((done / total) * 100) : 0;
            document.getElementById('weekProgressValue').innerText = `${percent}%`;
        }

        function updateRings() {
            ['Дом', 'Работа', 'Личное'].forEach((cat) => {
                const cTasks = tasks.filter((t) => t.cat === cat);
                const doneCount = cTasks.filter((t) => t.done).length;
                const total = cTasks.length;

                const key = cat === 'Дом' ? 'home' : cat === 'Работа' ? 'work' : 'personal';
                const ring = document.querySelector(`#ring-${key} .ring-active`);
                const radius = 34;
                const circ = 2 * Math.PI * radius;
                ring.style.strokeDashoffset = circ * (1 - (total ? doneCount / total : 0));

                document.getElementById(`val-${key}`).innerText = `${doneCount}/${total}`;
            });
        }

        function bindTaskInteractions(el, id) {
            el.onclick = (e) => handleTaskClick(e, id);
            el.ondblclick = (e) => editTask(e, id);

            el.onmousedown = (e) => startLongPress(e, id);
            el.ontouchstart = (e) => startLongPress(e, id);

            el.onmouseup = cancelLongPress;
            el.onmouseleave = cancelLongPress;
            el.ontouchend = cancelLongPress;
            el.ontouchcancel = cancelLongPress;
        }

        function createTaskElement(t, isArchive = false) {
            const d = document.createElement('div');
            d.className = `task ${t.pri || ''} cat-${t.cat}`;
            if (isArchive) d.style.opacity = '0.55';

            bindTaskInteractions(d, t.id);

            d.innerHTML = `
                <span class="task-title">${t.title}</span>
                <div class="task-actions">
                    <div class="edit-btn" onclick="editTask(event, ${t.id})">✎</div>
                    <div class="del-x" onclick="deleteTask(event, ${t.id})">×</div>
                </div>
            `;

            return d;
        }

        function renderWeekGrid() {
            const currentSelectedDay = taskDaySelect.value;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            daysShort.forEach((day, i) => {
                const isToday = day === currentDayId;
                const visibleTasks = tasks.filter((t) => t.day === day && !t.done && passesFilter(t));
                const allActiveInDay = tasks.filter((t) => t.day === day && !t.done);

                const card = document.createElement('div');
                card.className = `day-card ${day === currentSelectedDay ? 'selected' : ''} ${isToday ? 'today' : ''}`;
                card.onclick = () => selectDay(day);

                const header = document.createElement('div');
                header.className = 'day-title-row';
                header.innerHTML = `
                    <div class="day-title">${dayNames[i]}</div>
                    <div class="day-meta">
                        ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
                        <div class="day-count">${visibleTasks.length}/${allActiveInDay.length} задач</div>
                    </div>
                `;
                card.appendChild(header);

                visibleTasks.forEach((t) => {
                    const taskEl = createTaskElement(t, false);
                    card.appendChild(taskEl);
                });

                grid.appendChild(card);
            });
        }

        function renderArchive() {
            const archive = document.getElementById('archive');
            const doneTasks = tasks.filter((t) => t.done && passesFilter(t));
            archive.innerHTML = '';

            doneTasks.forEach((t) => {
                const taskEl = createTaskElement(t, true);
                archive.appendChild(taskEl);
            });
        }

        function render() {
            saveTasks();
            updateWeekProgress();
            updateRings();
            renderWeekGrid();
            renderArchive();
        }

        render();
        focusTaskInput();
    </script>
</body>
</html>
