<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ReleaseMaster Glass Pro</title>
  <meta name="viewport" content="width=900">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #dde8fa 0, #e9fae3 100%);
      font-family: 'Inter', system-ui, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .sticky-topbar {
      position: sticky;
      top: 0;
      z-index: 1001;
      background: rgba(255,255,255,.84);
      box-shadow: 0 2px 22px 0 rgba(44,62,88,0.11), 0 1px 0 #d7e6e9;
      backdrop-filter:blur(17px);
      padding-top: 17px;
      padding-bottom: 8px;
    }
    .progress-bar-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0;
      padding: 0;
    }
    .progress-bar {
      width: 88vw; max-width: 810px;
      height: 6px;
      border-radius: 7px;
      background: #e6efff;
      box-shadow: 0 1px 8px rgba(33,90,44,0.08);
      overflow: hidden;
      margin-bottom: 0;
      position:relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg,#12d47a,#1fc3ff 80%);
      width: 0;
      transition: width .5s cubic-bezier(.42,1.03,.17,.99);
      box-shadow: 0 1px 12px #12d47afd;
    }
    .mainbox {
      margin: 56px auto 0 auto;
      max-width: 890px;
      background: rgba(255,255,255,0.62);
      border-radius: 19px;
      box-shadow: 0 8px 48px 0 rgba(44,68,110,0.10), 0 1px 2px 0 rgba(44,62,80,0.06);
      padding: 0px 16px 32px 16px;
      backdrop-filter: blur(18px);
      transition: box-shadow .22s;
      position: relative;
    }
    .add-row-sticky {
      position: sticky;
      top: 24px;
      z-index: 1000;
      padding-top: 10px;
      background: rgba(255,255,255,0.70);
      margin-bottom: 4px;
      border-radius: 16px 16px 10px 10px;
      box-shadow: 0 2px 20px 0 #12c27715;
      backdrop-filter: blur(17px);
    }
    h1 {
      text-align: center;
      color: #1daf84;
      font-size: 23.5px;
      font-family: inherit;
      font-weight: 900;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      text-shadow:0 2px 8px rgba(17,80,54,0.09);
    }
    .add-row-wrap {
      text-align: center;
      margin-bottom: 7px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .row-inputbox {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .row-input {
      font-size:15.5px;
      padding:8.5px 10px;
      border-radius:6px;
      border:1.2px solid #b2becd;
      width: 370px;
      min-width:210px;
      margin-right:2px;
      background:#f7fafc;
      outline:none;
      transition: border-color .18s, background .18s;
      height:33px;
    }
    .row-input:focus {
      border:1.5px solid #12c277;
      background:#edfdf4;
    }
    .btn-addrow {
      background: linear-gradient(90deg,#1fc3ff,#12d47a 78%);
      color: #fff;
      font-weight:900;
      font-size:15.8px;
      border:none;
      border-radius:8px;
      padding:8.8px 23px;
      box-shadow:0 4px 17px 0 #1dc1de17, 0 1px 2px 0 #28e7671c;
      cursor:pointer;
      transition:box-shadow .12s,transform .14s;
      outline:none;
      height: 38px;
      user-select:none;
    }
    .btn-addrow:hover, .btn-addrow:focus {
      box-shadow:0 10px 25px 0 #1ddde71c, 0 2px 7px 0 #28e76736;
      transform: translateY(-1px) scale(1.03);
    }
    .input-hint {
      font-size:12.5px;
      color:#4987d6da;
      opacity:.94;
      text-align: center;
      letter-spacing:0.01em;
      margin-bottom:2px;
      margin-left:auto;
      margin-right:auto;
      max-width:93%;
      font-weight:400;
      user-select:none;
    }
    .go-nav-buttons {
      position: fixed;
      right: 30px;
      bottom: 30px;
      z-index:2500;
      display: flex;
      flex-direction: column;
      gap:7px;
      pointer-events:none;
    }
    .nav-btn {
      background: #fff;
      border: none;
      font-size: 22px;
      box-shadow: 0 4px 14px #1781d917, 0 2px 8px #3fd28325;
      border-radius: 50%;
      padding: 8px 13px;
      cursor:pointer;
      transition:background .14s,box-shadow .17s,transform .15s;
      outline:none;
      opacity:.89;
      color:#0d7da3;
      pointer-events:auto;
      display:block;
      margin-bottom:0;
    }
    .nav-btn:hover {
      background: #e5fcfc;
      color:#10ad90;
      opacity: 1;
      transform: scale(1.13);
    }

    table {
      border-collapse:separate;
      border-spacing:0 7px;
      width:100%;
      font-family: inherit;
    }
    thead th {
      background: #237a55;
      color: #f6fcfa;
      font-size:13.8px;
      font-weight:900;
      text-align: left;
      letter-spacing:0.4px;
      border:none;
      padding: 7px 7px 8px 7px;
      user-select:none;
    }
    tbody td {
      background: rgba(255,255,255,0.97);
      border: none;
      font-size:13.8px;
      padding: 10px 7px 10px 8px;
      vertical-align: top;
      position:relative;
      transition: background 0.12s, box-shadow .15s, transform .15s;
      border-radius: 9px;
    }
    tr.slide-in {
      animation: slideinrow .42s;
    }
    @keyframes slideinrow {
      from {transform: translateY(60px) scale(.98); opacity: 0;}
      to   {transform: translateY(0) scale(1);   opacity: 1;}
    }
    tbody tr {
      transition:box-shadow .16s, transform .13s, background .13s;
      border-radius: 9px;
    }
    tbody tr:hover {
      box-shadow: 0 3px 12px rgba(44,170,150,0.10),0 0.5px 3.5px #13e2a322;
      background:rgba(43,212,174,0.065);
      transform: translateY(-2.5px) scale(1.008);
      z-index:2;
      position:relative;
    }
    td.result-stop {
      color: #b90014;
      background: #ffe7e7de!important;
      font-weight: 900;
      font-size: 13.2px;
      border-left:5px solid #ff3b30;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cross { font-size:15px; color:#d71333; }
    td.result-ok {
      color: #135e0e;
      background: #eaffeddb!important;
      font-weight: 900;
      font-size: 13.2px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .check { font-size:17px; color:#21bb2e; }
    .sku-cell {
      font-weight: 900;
      font-size: 13px;
      letter-spacing:0.2px;
      color:#158fdf;
      text-align:center;
      word-break:break-all;
      padding-left:3px;
      padding-right:3px;
    }
    .ans-badge {
      padding: 6px 12px 6px 12px;
      font-size: 13.6px;
      font-weight: 900;
      border-radius: 12px;
      display:inline-block;
      margin-right:9px;
      cursor:pointer;
      min-width:87px;
      text-align:center;
      border:1.1px solid #eaecec;
      background:#eaf6fc;
      user-select:none;
      transition:box-shadow .12s, background .11s;
    }
    .badge-pending {background: #edf4fb;color: #adacac; border-color: #c4e0e0;}
    .badge-not {background: #ff4747 !important; color: #fff !important; border:none;}
    .badge-yes {background: linear-gradient(90deg,#43e77a,#16c5c4 70%)!important; color: #fff !important; border:none;}
    .badge-dub {background: #e8eef3 !important; color: #395478 !important; border:none;}
    .ans-badge:hover, .ans-badge:focus { box-shadow:0 2px 9px #13e2a32a; }
    .ans-dropdown {
      display:flex; flex-direction:column;
      background: #fff;
      border-radius:8px;
      box-shadow:0 7px 28px rgba(20,180,170,0.13);
      border:1px solid #c5e7df;
      position:absolute; z-index:202;
      top:34px; left:0;
      min-width:98px;
      overflow:hidden;
      animation:fadein .14s cubic-bezier(.43,1.08,.19,.99);
    }
    @keyframes fadein {
      from { opacity:.09; transform:scale(.90) translateY(10px);}
      to   { opacity:1;    transform:scale(1)    translateY(0);}
    }
    .ans-opt-btn {
      border:none; background:transparent;
      padding:7px 9px;
      font-size:13.3px; font-weight:900;
      cursor:pointer;
      text-align:left;
      transition:.09s;
      min-width:92px;
      outline:none;
    }
    .ans-opt-btn:not(:last-child) { border-bottom:1px solid #e8edec;}
    .ans-opt-btn.badge-pending:hover {background:#e7f6ff;}
    .ans-opt-btn.badge-not:hover {background:#fa6868;}
    .ans-opt-btn.badge-yes:hover {background:#76ffe9;}
    .ans-opt-btn.badge-dub:hover  {background:#dde8ff;}
    .ans-opt-btn:active{transform:scale(.97);}
    .btn-delrow {
      background:#c9c5c5;
      font-size:14px;
      color:#fff;
      border:none;
      border-radius:7px;
      padding:3px 11px 3px 11px;
      box-shadow: 0 1px 6px #f5b1b153;
      margin-left:8px;
      cursor:pointer;
      transition:.13s;
      outline:none;
      opacity:0.84;
    }
    .btn-delrow:hover, .btn-delrow:focus {background:#df6262;opacity:1;}
    @media (max-width:650px) {
      .mainbox{padding:1vw;}
      .row-input{width:94vw; margin-bottom:8px;}
      thead th{font-size:11px;}
      .ans-badge{font-size:11.4px; min-width:66px;}
    }
  </style>
</head>
<body>
<div class="sticky-topbar">
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-bar-fill" id="readyBar"></div></div>
  </div>
  <div class="add-row-sticky" id="rowInputSticky">
    <div class="add-row-wrap">
      <div class="row-inputbox">
        <input id="txtrow" class="row-input" placeholder="Вставьте/введите строку с идентификатором товара…"
               autocomplete="off"
               onkeydown="if(event.key==='Enter'){addRow();}">
        <button class="btn-addrow" onclick="addRow()">Добавить строку</button>
      </div>
      <div class="input-hint">
        Вставлять нужно всю строку целиком, например:<br>
        <span style="opacity:.82;font-size:12px;color:#158ad7;">
          Идентификатор товара 35100334591 / Леггинсы меховые с начесом зимние лосины теплые / ВБ стикер WBS 43694157043 / Не в заказе
        </span>
      </div>
    </div>
  </div>
</div>
<div class="mainbox" id="mainbox">
  <h1 style="margin-bottom:13px;">Форма на релиз</h1>
  <table>
    <thead>
      <tr>
        <th style="width:40%;">Идентификатор товара</th>
        <th style="width:21%;">Результат</th>
        <th style="width:14%;">ШК</th>
        <th style="width:18%;">Ответ</th>
        <th style="width:5%;"></th>
      </tr>
    </thead>
    <tbody id="tRows"></tbody>
  </table>
</div>
<div class="go-nav-buttons" id="goNavBox">
  <button class="nav-btn" title="В начало" onclick="goUp()">
    ⬆️
  </button>
  <button class="nav-btn" title="В конец" onclick="goDown()">
    ⬇️
  </button>
</div>
<script>
const STORAGE_KEY = 'releaseFormRowsGlassPro';
const answerVariants = [
  { key: '-',   name: '-',              class:'badge-pending' },
  { key: 'not', name: 'не релиз',       class:'badge-not' },
  { key: 'yes', name: 'подано на релиз',class:'badge-yes' },
  { key: 'dub', name: 'дубль',          class:'badge-dub' },
];
// --- ROW LOGIC ---
function parseRow(str){
  let resultText = '';
  str = str||"";
  let resType = '';
  if (/не в заказе/i.test(str) || /можно на релиз/i.test(str)) {
    resultText = `МОЖНО НА РЕЛИЗ`;
    resType = 'ok';
  } else if (/в заказе/i.test(str)) {
    resultText = `СТОП: В ЗАКАЗЕ`;
    resType = 'stop';
  }
  let sku = '';
  let res = str.match(/\b\d{7,13}\b/);
  if(res) sku = res[0];
  return {
    raw:str, resType:resType, result:resultText, sku:sku, answer:'-'
  }
}
// --- RENDER LOGIC ---
function renderRows(appearedIdx){
  const rows = loadRows();
  const tbody = document.getElementById('tRows');
  tbody.innerHTML='';
  rows.forEach((row,i)=>{
    let resTd = row.resType==='stop' ? `<td class="result-stop"><span class="cross">⛔</span> ${row.result}</td>` :
               row.resType==='ok'   ? `<td class="result-ok"><span class="check">✔️</span> ${row.result}</td>` :
                `<td></td>`;
    let skuTd = `<td class="sku-cell">${row.sku||''}</td>`;
    let badge = answerVariants.find(v=>v.key===row.answer);
    let badgeClass = badge?.class||'badge-pending';
    let badgeHtml =
    `<div class="ans-badge ${badgeClass}" tabindex="0" onclick="openAnsDropdown(event,${i})" onkeydown="if(event.key===' '||event.key==='Enter'){openAnsDropdown(event,${i});}" role="button" aria-haspopup="listbox">
      ${badge?.name || '-'}
      <svg style="vertical-align:middle;margin-left:6px;opacity:.73;" width="11" height="10" viewBox="0 0 16 16"><path d="M4.2 6.1l3.8 3.8 3.8-3.8" fill="none" stroke="#666" stroke-width="2.1" stroke-linecap="round"/></svg>
    </div>
    <div class="ans-dropdown-wrap" style="position:relative;"></div>`;
    let ansTd = `<td style="position:relative;">${badgeHtml}</td>`;
    let delTd = `<td><button class="btn-delrow" title="Удалить строку" onclick="delRow(${i})">×</button></td>`;
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.raw}</td>
      ${resTd}
      ${skuTd}
      ${ansTd}
      ${delTd}
    `;
    if(typeof appearedIdx==='number' && i===appearedIdx) tr.classList.add('slide-in');
    tbody.appendChild(tr);
  });
  updateProgressBar();
}
function addRow(){
  let inp = document.getElementById('txtrow');
  let val = inp.value.trim();
  if(!val) return;
  let rowObj = parseRow(val);
  let arr = loadRows();
  arr.push(rowObj);
  saveRows(arr);
  renderRows(arr.length-1);
  inp.value = ''; // ОЧИЩАЕТ поле ввода после добавления!
  setTimeout(()=>{
    scrollToInput();
    focusRowInput();
  },120);
}
function delRow(idx){
  let arr = loadRows();
  arr.splice(idx,1);
  saveRows(arr);
  renderRows();
}
function loadRows(){
  let arr = [];
  try{arr=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch(e){}
  return Array.isArray(arr) ? arr : [];
}
function saveRows(arr){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
// --- DROPDOWN (badge) LOGIC ---
let openedAnsDropdownIdx = undefined;
function openAnsDropdown(e,idx){
  closeAnsDropdown();
  e.stopPropagation();
  let td = e.target.closest('td');
  let wrap = td.querySelector('.ans-dropdown-wrap');
  let arr = loadRows();
  let dropdownDiv = document.createElement('div');
  dropdownDiv.className = "ans-dropdown";
  answerVariants.forEach(v=>{
    let b = document.createElement('button');
    b.setAttribute('type','button');
    b.setAttribute('class',`ans-opt-btn ${v.class}`);
    b.innerText = v.name;
    b.onclick = function(ev){
      arr[idx].answer = v.key;
      saveRows(arr);
      closeAnsDropdown();
      renderRows();
      focusRowInput();
    };
    dropdownDiv.appendChild(b);
  });
  wrap.appendChild(dropdownDiv);
  openedAnsDropdownIdx = idx;
  document.addEventListener('mousedown', clickAwayCloseAnsDropdown,true);
  document.addEventListener('keydown', escapeCloseAnsDropdown,true);
}
function clickAwayCloseAnsDropdown(e){
  if(!e.target.closest('.ans-dropdown') && !e.target.closest('.ans-badge')) closeAnsDropdown();
}
function escapeCloseAnsDropdown(e){
  if(e.key==='Escape'){ closeAnsDropdown(); }
}
function closeAnsDropdown(){
  document.querySelectorAll('.ans-dropdown').forEach(d=>d.remove());
  document.removeEventListener('mousedown', clickAwayCloseAnsDropdown,true);
  document.removeEventListener('keydown', escapeCloseAnsDropdown,true);
  openedAnsDropdownIdx = undefined;
}
// --- PROGRESS BAR ---
function updateProgressBar(){
  let arr = loadRows();
  let total = arr.length||1, ready = arr.filter(x=>x.answer==='yes').length;
  let percent = Math.round(ready/total*100);
  document.getElementById('readyBar').style.width = percent+'%';
  document.getElementById('readyBar').title = `Подано на релиз: ${ready} из ${total}`;
}
// --- Перемотка вверх/вниз и автофокус ---
function scrollToInput(){
  let inputBox = document.getElementById('rowInputSticky');
  let y = inputBox.getBoundingClientRect().top + window.scrollY - 22;
  window.scrollTo({top: y, behavior: 'smooth'});
}
function focusRowInput(){
  let inp = document.getElementById('txtrow');
  if(inp){ inp.focus(); }
}
function goUp(){
  scrollToInput();
  focusRowInput();
}
function goDown(){
  let lastRow = document.querySelector('#tRows tr:last-child');
  if(lastRow) lastRow.scrollIntoView({behavior:'smooth', block:'end'});
}
// Показывать навкнопки только если >12 строк
function updateNavButtons(){
  let arr = loadRows();
  document.getElementById('goNavBox').style.display = (arr.length>12) ? 'flex' : 'none';
}
window.addEventListener('resize',updateNavButtons);
window.onload = ()=>{
  renderRows();
  updateNavButtons();
};
// Перемотка nav при добавлении/удалении строки
let origRenderRows=renderRows;
renderRows=function(a){
  origRenderRows(a);
  updateNavButtons();
}
</script>
</body>
</html>
