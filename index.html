<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAN TRU FREE | ELITE OS 2026</title>
    <style>
        /* БАЗОВЫЙ СТИЛЬ */
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        /* АКТИВНЫЙ ОГОНЬ */
        .fire-bg { position: absolute; width: 100%; height: 100%; z-index: -3; background: #000; overflow: hidden; top: 0; left: 0; }
        .fire-flame { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.7; animation: burn 4s infinite alternate ease-in-out; }
        .f1 { width: 700px; height: 700px; background: radial-gradient(circle, #ff2200, #ff6600, transparent); bottom: -15%; left: 10%; animation-duration: 3s; }
        .f2 { width: 600px; height: 600px; background: radial-gradient(circle, #ffcc00, #ff4400, transparent); bottom: -20%; right: 10%; animation-duration: 5s; }
        .f3 { width: 500px; height: 500px; background: radial-gradient(circle, #ff0000, #881100, transparent); bottom: -10%; left: 40%; animation-duration: 4s; }
        @keyframes burn {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: translate(-50px, -80px) scale(1.3) rotate(10deg); opacity: 0.8; }
            100% { transform: translate(50px, -40px) scale(0.8) rotate(-10deg); opacity: 0.4; }
        }
        .glass-panel { position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(80px); -webkit-backdrop-filter: blur(80px); z-index: -1; top: 0; left: 0; }

        /* ПОИСК */
        .search-container { margin-bottom: 30px; z-index: 10; }
        .search-bar { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 30px; 
            border-radius: 50px; color: white; width: 350px; text-align: center; 
            outline: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 14px; 
        }
        .search-bar:focus { width: 500px; border-color: #ff3300; box-shadow: 0 0 30px rgba(255, 51, 0, 0.2); }

        /* ЭФФЕКТЫ УВЕЛИЧЕНИЯ (ДЛЯ ВСЕГО) */
        .h-grow { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; cursor: default; }
        .h-grow:hover { transform: scale(1.1) translateY(-5px); text-shadow: 0 0 30px rgba(255,255,255,0.4); }

        /* ЗАГОЛОВКИ МЕТАЛЛ */
        .main-title { font-size: 120px; font-weight: 900; letter-spacing: -5px; margin: 0; line-height: 0.8; background: linear-gradient(180deg, #ffffff 0%, #777 45%, #fff 55%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-title { font-size: 70px; font-weight: 900; letter-spacing: 20px; color: #ff3300; margin: 15px 0; text-shadow: 0 0 40px rgba(255,51,0,0.5); }
        #clock { font-size: 2.2rem; letter-spacing: 15px; font-weight: 100; margin-bottom: 25px; }

        /* ВИДЖЕТЫ */
        .side-widget { position: absolute; top: 12%; width: 230px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; backdrop-filter: blur(30px); padding: 25px; transition: 0.4s; }
        .left-side { left: 40px; } .right-side { right: 40px; }
        .side-widget:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.3); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 1000px; margin-top: 30px; }
        .widget { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 25px; transition: 0.4s; }
        .widget:hover { transform: translateY(-10px) scale(1.05); border-color: rgba(255,255,255,0.3); }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; transition: 2s; box-shadow: 0 0 15px currentColor; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; font-size: 11px; text-align: center; margin-top: 20px; }
        .cal-date.today { background: #fff; color: #000; border-radius: 8px; font-weight: 900; }

        .socials { margin-top: 20px; display: flex; gap: 40px; z-index: 10; }
        .socials a { color: #444; text-decoration: none; font-size: 11px; letter-spacing: 4px; font-weight: 900; transition: 0.3s; }
        .socials a:hover { color: #fff; transform: scale(1.2); }

        .ticker { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.8); font-size: 10px; letter-spacing: 5px; color: #333; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            body { justify-content: flex-start; overflow-y: auto; padding: 40px 0; }
            .main-title { font-size: 45px; } .sub-title { font-size: 30px; letter-spacing: 8px; }
            .side-widget { position: relative; top: 0; left: 0; right: 0; width: 85%; margin: 15px auto; }
            .dashboard-grid { grid-template-columns: 1fr; width: 90%; }
            .ticker { display: none; }
        }
    </style>
</head>
<body>

    <div class="fire-bg"><div class="fire-flame f1"></div><div class="fire-flame f2"></div><div class="fire-flame f3"></div></div>
    <div class="glass-panel"></div>

    <form class="search-container" action="https://google.com" method="GET">
        <input type="text" name="q" class="search-bar" placeholder="GOOGLE SEARCH SYSTEM...">
    </form>

    <div id="clock" class="h-grow">00:00:00</div>
    <h1 class="main-title h-grow">VAN TRU FREE</h1>
    <div class="sub-title h-grow">HOPE</div>
    <div class="h-grow" style="font-size: 10px; letter-spacing: 12px; color: #444; margin-bottom: 20px;">AI EDITION 2026</div>
    <div id="quote" class="h-grow" style="font-size: 13px; color: #666; font-style: italic; margin-bottom: 25px; transition: 0.5s;">...</div>

     <div class="socials">
        <a href="https://t.me/vantrufree" target="_blank">TELEGRAM</a>
        <a href="https://www.youtube.com/@vantrufree" target="_blank">YOUTUBE</a>
    </div>

    <!-- ТАЙМЕР -->
    <div class="side-widget left-side">
        <div style="font-size: 10px; color: #555; letter-spacing: 3px;">FOCUS MODE</div>
        <div id="pomo-display" style="font-size: 45px; text-align: center; margin: 25px 0; font-weight: 100;">25:00</div>
        <button onclick="togglePomo()" style="width:100%; background: #fff; color: #000; border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: 900; margin-bottom: 10px;">START / STOP</button>
        <button onclick="resetPomo()" style="width:100%; background: none; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 15px; cursor: pointer;">RESET</button>
    </div>

    <!-- КАЛЕНДАРЬ -->
    <div class="side-widget right-side">
        <div style="font-size: 10px; color: #555; letter-spacing: 3px;" id="m-name">CALENDAR</div>
        <div class="cal-grid" id="calendar"></div>
    </div>

    <!-- НИЗ -->
    <div class="dashboard-grid">
        <div class="widget">
            <span style="font-size:10px; color:#555; letter-spacing:2px;">FINANCE</span>
            <div id="rates" style="font-size: 22px; font-weight: 900; background: linear-gradient(#fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 10px;">USD: 92.40₽<br>EUR: 101.15₽</div>
        </div>
        <div class="widget">
            <span style="font-size:10px; color:#555; letter-spacing:2px;">GOALS</span>
            <input type="text" id="t-in" style="background: none; border: none; border-bottom: 1px solid #333; color: #fff; width: 100%; outline: none; padding: 5px 0;" placeholder="+ Add task...">
            <ul id="t-list" style="list-style: none; padding: 0; font-size: 13px; margin-top: 10px;"></ul>
        </div>
        <div class="widget">
            <span style="font-size:10px; color:#555; letter-spacing:2px;">FLOW 2026</span>
            <div style="font-size: 10px;">Year: <span id="y-txt">0%</span></div>
            <div class="progress-bar"><div id="y-bar" class="fill" style="background: #ff3300; width: 0%;"></div></div>
            <div style="font-size: 10px; margin-top: 10px;">Day: <span id="d-txt">0%</span></div>
            <div class="progress-bar"><div id="d-bar" class="fill" style="background: #0044ff; width: 0%;"></div></div>
        </div>
    </div>

    <div class="ticker"><marquee scrollamount="6">VAN TRU FREE // 2026 // FIRE ENGINE ONLINE // STAY FOCUSED</marquee></div>

    <script>
        function run() {
            const up = () => {
                const n = new Date();
                document.getElementById('clock').innerText = n.toLocaleTimeString('ru');
                const sD = new Date(n.getFullYear(), n.getMonth(), n.getDate());
                const dP = ((n - sD) / 86400000 * 100).toFixed(1);
                document.getElementById('d-txt').innerText = dP + '%';
                document.getElementById('d-bar').style.width = dP + '%';
                const sY = new Date(n.getFullYear(), 0, 1);
                const yP = ((n - sY) / (new Date(n.getFullYear()+1, 0, 1) - sY) * 100).toFixed(1);
                document.getElementById('y-text' ? 'y-txt' : 'y-txt').innerText = yP + '%';
                document.getElementById('y-bar').style.width = yP + '%';
            };
            setInterval(up, 1000); up();

            const cal = document.getElementById('calendar'), n = new Date();
            const dIM = new Date(n.getFullYear(), n.getMonth() + 1, 0).getDate();
            const start = new Date(n.getFullYear(), n.getMonth(), 1).getDay();
            const off = start === 0 ? 6 : start - 1;
            document.getElementById('m-name').innerText = n.toLocaleString('ru', {month:'long'}).toUpperCase();
            cal.innerHTML = 'ПВСРЧПС'.split('').map(d=>`<div style="color:#ff3300; font-weight:900;">${d}</div>`).join('');
            for(let i=0; i<off; i++) cal.innerHTML += '<div></div>';
            for(let i=1; i<=dIM; i++) cal.innerHTML += `<div class="cal-date ${i===n.getDate()?'today':''}">${i}</div>`;

            const qs = ["Стиль — это ответ всему.", "Будущее 2026: ИИ везде.", "Создавай то, что невозможно игнорировать.", "Твой предел — воображение."];
            let lastQ = -1;
            const changeQ = () => {
                let nextQ;
                do { nextQ = Math.floor(Math.random() * qs.length); } while (nextQ === lastQ);
                lastQ = nextQ;
                const qBox = document.getElementById('quote');
                qBox.style.opacity = 0;
                setTimeout(() => { qBox.innerText = qs[nextQ]; qBox.style.opacity = 1; }, 500);
            };
            setInterval(changeQ, 300000); changeQ();

            const tin = document.getElementById('t-in'), tl = document.getElementById('t-list');
            let ts = JSON.parse(localStorage.getItem('vtf_t')) || ["Построить империю", "Изучить AI"];
            const ren = () => { tl.innerHTML = ts.map((t,i)=>`<li style="margin-bottom:5px;">• ${t} <span style="color:red; cursor:pointer; float:right" onclick="window.dl(${i})">✕</span></li>`).join(''); localStorage.setItem('vtf_t', JSON.stringify(ts)); };
            tin.onkeypress = (e) => { if(e.key==='Enter' && tin.value) { ts.push(tin.value); tin.value=''; ren(); } };
            window.dl = (i) => { ts.splice(i,1); ren(); }; ren();

            let pt = 1500, pi = null;
            window.togglePomo = () => {
                if(pi) { clearInterval(pi); pi=null; }
                else { pi=setInterval(()=>{ if(pt>0){ pt--; let m=Math.floor(pt/60), s=pt%60; document.getElementById('pomo-display').innerText=`${m}:${s<10?'0':''}${s}`; } },1000); }
            };
            window.resetPomo = () => { pt=1500; document.getElementById('pomo-display').innerText="25:00"; if(pi){clearInterval(pi); pi=null;} };

            fetch('https://frankfurter.dev').then(r => r.json()).then(d => {
                document.getElementById('rates').innerHTML = `USD: ${d.rates.RUB.toFixed(2)}₽<br>EUR: ${(d.rates.RUB * 1.08).toFixed(2)}₽`;
            }).catch(()=>{});
        }
        window.onload = run;
    </script>
</body>
</html>
