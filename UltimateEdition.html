<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 6.8 | MULTI-BATCH EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel-bg: rgba(15, 15, 15, 0.9);
            --accent: #a1a1aa;
            --accent-bright: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #52525b;
            --success: #27c93f;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            color: var(--accent);
            font-family: var(--font);
            margin: 0; padding: 25px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .top-bar {
            width: 100%; max-width: 1200px; display: flex; 
            justify-content: space-between; font-size: 10px; 
            letter-spacing: 2px; margin-bottom: 20px; opacity: 0.5;
        }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 100%; max-width: 1200px; flex-grow: 1;
        }

        .window {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            height: 600px;
        }

        .window-header {
            padding: 12px 18px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border);
            justify-content: space-between; background: rgba(255,255,255,0.02);
        }

        .window-body { flex-grow: 1; display: flex; }

        textarea {
            width: 100%; height: 100%; background: transparent; border: none;
            color: #d4d4d8; font-family: var(--font); font-size: 12px; line-height: 1.6;
            resize: none; outline: none; padding: 20px;
        }

        .window-footer {
            padding: 12px 20px; border-top: 1px solid var(--border); 
            display: flex; gap: 10px; background: rgba(0, 0, 0, 0.2);
        }

        .btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: var(--accent); padding: 7px 15px; font-size: 10px; cursor: pointer;
            border-radius: 4px; transition: 0.2s; text-transform: lowercase;
        }

        .btn:hover { background: var(--accent-bright); color: var(--bg); }

        .log-area {
            width: 100%; max-width: 1200px; margin-top: 20px;
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 15px 20px; font-size: 11px; color: var(--text-dim);
        }

        ::selection { background: var(--success); color: #000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>CORE // V.6.8</div>
        <div style="color: #fff; font-weight: 700;">MULTI_BATCH_COMPILER</div>
        <div id="datetime">--.--.---- // --:--:--</div>
    </div>

    <div class="grid">
        <div class="window">
            <div class="window-header">
                <div style="font-size: 9px; opacity: 0.5;">INPUT_STREAM (MULTI)</div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="Вставьте сразу много карточек товара..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./run_batch</button>
                <button class="btn" onclick="clearAll()">clear</button>
            </div>
        </div>

        <div class="window">
            <div class="window-header">
                <div style="font-size: 9px; opacity: 0.5;">REFINED_LIST</div>
                <div id="counter" style="font-size: 8px; color: var(--success);">COUNT: 0</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="Result list..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" id="copy-btn" onclick="copyResult()">cp_to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area" id="log">> SYSTEM_READY: BATCH_MODE_ENABLED</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('datetime').innerHTML = now.toLocaleDateString('ru-RU') + ' // ' + now.toLocaleTimeString('ru-RU');
    }
    setInterval(updateClock, 1000); updateClock();

    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');
    const logEl = document.getElementById('log');

    inputArea.addEventListener('paste', () => setTimeout(processData, 150));

    function processData() {
        const fullText = inputArea.value.trim();
        if(!fullText) return;

        // РАЗДЕЛЕНИЕ НА БЛОКИ
        // Мы режем текст там, где начинается новая карточка (по фразе "Идентификатор товара")
        const blocks = fullText.split(/(?=Идентификатор товара|Предмет:)/i).filter(b => b.trim().length > 20);
        let finalResults = [];

        blocks.forEach(text => {
            // --- ЛОГИКА ПАРСИНГА ДЛЯ КАЖДОГО БЛОКА ---
            
            // 1. ID и Стикер
            const idMatch = text.match(/\b\d{10,12}\b/);
            const id = idMatch ? idMatch[0] : "";
            const sticker = id;

            // 2. Статус
            const statusMatch = text.match(/\b(WLI|LIO|BOX|CON|OK|ERR)\b/);
            const status = statusMatch ? statusMatch[0].toUpperCase() : "";

            // 3. Наименование
            let name = "";
            const nameMatch = text.match(/Предмет\s*\n?\s*([^/\n\r\t]+)/i);
            if (nameMatch) {
                name = nameMatch[1].trim();
            } else {
                const altMatch = text.match(/Идентификатор товара\s+\d+\s+\/\s+([^/]+)/i);
                if (altMatch) name = altMatch[1].trim();
            }

            // 4. Стоимость
            const priceMatch = text.match(/(?:\s|^)(\d[\d\s]*)\s*₽/);
            const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "";

            // 5. MX
            const mxMatch = text.match(/(?:ВЛАД|ЦП|MX)[\d\.]+/i);
            const mx = mxMatch ? mxMatch[0] : "";

            // 6. BOX (Только если есть слово BOX)
            const boxMatch = text.match(/BOX\s*(\d+)/i);
            const box = boxMatch ? boxMatch[1] : "";

            // Собираем строку только если нашли ID (чтобы не плодить пустые строки)
            if (id) {
                finalResults.push(`${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`);
            }
        });

        // ВЫВОД
        outputArea.value = finalResults.join('\n');
        document.getElementById('counter').innerText = `COUNT: ${finalResults.length}`;
        logEl.innerText = `> BATCH_COMPLETE: ${finalResults.length} ITEMS PROCESSED`;
    }

    async function copyResult() {
        if(!outputArea.value) return;
        await navigator.clipboard.writeText(outputArea.value);
        const btn = document.getElementById('copy-btn');
        btn.innerText = 'copied!';
        setTimeout(() => btn.innerText = 'cp_to_buffer', 1000);
    }

    function clearAll() {
        inputArea.value = ''; outputArea.value = '';
        document.getElementById('counter').innerText = `COUNT: 0`;
        logEl.innerText = '> SYSTEM_RESET: READY';
        inputArea.focus();
    }
</script>
</body>
</html>
