<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6 // DOMINATOR</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #bcbcbc; /* Тот самый серый фон из оригинала */
            --panel: #0d0d0d;
            --gold: #d4af37;
            --green: #22c55e;
        }

        /* Кастомная "палка" скролла */
        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        textarea:hover::-webkit-scrollbar-thumb { background: #333; }

        body {
            background-color: var(--bg);
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
            transition: opacity 0.2s ease-out;
        }

        .header {
            width: 1100px; display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; margin-bottom: 50px;
        }

        .brand { color: var(--gold); font-size: 10px; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; }
        .main-title { color: var(--gold); font-size: 20px; font-weight: 600; letter-spacing: 12px; text-transform: uppercase; text-align: center; }
        .manual-btn { text-align: right; font-size: 10px; color: #666; cursor: pointer; border-bottom: 1px solid transparent; }
        .manual-btn:hover { color: var(--gold); border-bottom-color: var(--gold); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; width: 1100px; }

        .panel {
            background: var(--panel);
            border-radius: 10px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.02);
            height: 550px;
        }

        .panel-header {
            padding: 15px 20px; display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: #1a1a1a; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }

        .label { margin-left: 20px; font-size: 9px; color: #2a2a2a; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

        textarea {
            flex: 1; background: transparent; border: none; padding: 30px;
            color: #d1d1d1; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; line-height: 1.8; resize: none; outline: none;
        }

        .footer { padding: 20px 30px; border-top: 1px solid rgba(255,255,255,0.02); }

        .btn {
            background: transparent; border: 1px solid #1a1a1a; color: #444;
            padding: 8px 18px; font-size: 10px; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: 0.2s;
        }
        .btn:hover { border-color: var(--gold); color: var(--gold); }
        .btn:focus { border-color: #1e3a8a; color: #1e3a8a; }

        /* Тот самый терминал снизу */
        .terminal { width: 1100px; margin-top: 40px; font-family: 'JetBrains Mono', monospace; }
        .log-line { font-size: 10px; color: #1a1a1a; margin-bottom: 5px; opacity: 0.3; }
        .log-line.active { color: var(--green); opacity: 1; text-shadow: 0 0 5px rgba(34, 197, 94, 0.3); }

        /* Модалка Manual */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #0a0a0a; padding: 60px; border-left: 3px solid var(--gold); max-width: 450px; }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="header">
    <div class="brand">[ ENGINE BY VAN ]</div>
    <div class="main-title">ULTIMATE 6</div>
    <div class="manual-btn" onclick="toggleM()">manual guide</div>
</div>

<div class="grid">
    <div class="panel">
        <div class="panel-header">
            <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
            <div class="label">source_data_telemetry</div>
        </div>
        <textarea id="in" placeholder="READY FOR INPUT..."></textarea>
        <div class="footer"><button class="btn" onclick="run()">./run_analysis</button></div>
    </div>

    <!-- Клик в любое место вызывает копирование -->
    <div class="panel" onclick="copy()">
        <div class="panel-header">
            <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
            <div class="label">refined_output_buffer</div>
        </div>
        <textarea id="out" readonly placeholder="AWAITING COMPILATION..."></textarea>
        <div class="footer"><button class="btn">cp_to_buffer</button></div>
    </div>
</div>

<div class="terminal" id="logs">
    <div class="log-line active">> SYSTEM_READY: STANDBY_MODE</div>
</div>

<div id="modal" onclick="toggleM()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold); font-size:12px; letter-spacing:4px; margin-bottom:30px;">MANUAL</h3>
        <p style="color:#666; font-size:11px; line-height:2.4; margin:0;">
            1. ВСТАВЬТЕ СЫРЫЕ ДАННЫЕ В ЛЕВОЕ ОКНО.<br>
            2. НАЖМИТЕ ./RUN_ANALYSIS ДЛЯ СБОРКИ.<br>
            3. КЛИКНИТЕ В ЛЮБУЮ ТОЧКУ ПРАВОГО ОКНА ДЛЯ КОПИРОВАНИЯ.<br>
            4. ВСПЫШКА ПОДТВЕРДИТ УСПЕХ.
        </p>
    </div>
</div>

<script>
    function toggleM() { const m = document.getElementById('modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }

    function log(msg) {
        const l = document.getElementById('logs');
        const d = document.createElement('div');
        d.className = 'log-line active';
        d.innerHTML = '> ' + msg.toUpperCase();
        l.prepend(d);
        if(l.children.length > 5) l.lastChild.remove();
        Array.from(l.children).slice(1).forEach(i => i.classList.remove('active'));
    }

    function run() {
        const text = document.getElementById('in').value;
        if(!text.trim()) return;
        log('analyzing_patterns...');
        setTimeout(() => {
            const allNumbers = text.match(/\b\d{10,11}\b/g) || [];
            const id = allNumbers[0] || "";
            const sticker = allNumbers[1] || id;
            const status = (text.match(/\b[A-Z]{3,4}\b/) || [""])[0];
            const nameMatch = text.match(/Предмет\s*\n?\s*(.*?)(?=\n|\/|$)/i);
            const name = nameMatch ? nameMatch[1].trim() : "";
            const price = (text.match(/(\d+)\s*₽/) || ["",""])[1];
            const mx = (text.match(/(ВЛАД\d+|ЦП\d+)[^\s]*/i) || [""])[0];
            const box = (text.match(/\b(BOX|CON)\b\s*(\d+)/i) || ["","",""])[2];

            document.getElementById('out').value = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`;
            log('compilation_success');
        }, 400);
    }

    async function copy() {
        const v = document.getElementById('out').value;
        if(!v) return;
        await navigator.clipboard.writeText(v);
        const f = document.getElementById('flash');
        f.style.opacity = '1';
        setTimeout(() => f.style.opacity = '0', 200);
        log('clipboard_transfer_complete');
    }
</script>
</body>
</html>
