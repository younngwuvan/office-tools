
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 7.0 | FINAL PRECISION</title>
    <style>
        :root {
            --bg: #050505;
            --bg-soft: #0a0a0a;
            --panel-bg: rgba(15, 15, 15, 0.95);
            --panel-bg-2: rgba(255, 255, 255, 0.02);
            --accent: #a1a1aa;
            --accent-bright: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --text-dim: #52525b;
            --success: #27c93f;
            --warning: #f59e0b;
            --danger: #ef4444;
            --font: monospace;
            --shadow: 0 15px 35px rgba(0,0,0,0.5);
            --glow: 0 0 0 1px rgba(255,255,255,0.04), 0 18px 50px rgba(0,0,0,0.55);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% -20%, rgba(255,255,255,0.08) 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, rgba(255,255,255,0.03) 0%, transparent 30%);
            color: var(--accent);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            animation: pageFade 0.8s ease;
        }

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0.6;
            gap: 10px;
            flex-wrap: wrap;
            animation: slideDown 0.7s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 0.6;
                transform: translateY(0);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            flex-grow: 1;
        }

        .window {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            height: 600px;
            overflow: hidden;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            animation: windowIn 0.7s ease;
        }

        .window:nth-child(2) {
            animation-delay: 0.08s;
        }

        @keyframes windowIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .window:hover {
            border-color: rgba(255,255,255,0.12);
            box-shadow: var(--glow);
        }

        .window:focus-within {
            border-color: var(--border-strong);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 55px rgba(0,0,0,0.62);
            transform: translateY(-1px);
        }

        .window.has-output {
    border-color: rgba(39, 201, 63, 0.42);
    box-shadow:
        0 0 0 1px rgba(39, 201, 63, 0.16),
        0 0 14px rgba(39, 201, 63, 0.10),
        0 0 32px rgba(39, 201, 63, 0.08),
        0 0 70px rgba(39, 201, 63, 0.05),
        0 18px 48px rgba(0,0,0,0.60),
        inset 0 0 18px rgba(39, 201, 63, 0.035);
    animation: greenPulse 2.8s ease-in-out infinite;
}

@keyframes greenPulse {
    0%, 100% {
        box-shadow:
            0 0 0 1px rgba(39, 201, 63, 0.16),
            0 0 14px rgba(39, 201, 63, 0.10),
            0 0 32px rgba(39, 201, 63, 0.08),
            0 0 70px rgba(39, 201, 63, 0.05),
            0 18px 48px rgba(0,0,0,0.60),
            inset 0 0 18px rgba(39, 201, 63, 0.035);
    }
    50% {
        box-shadow:
            0 0 0 1px rgba(39, 201, 63, 0.22),
            0 0 18px rgba(39, 201, 63, 0.15),
            0 0 42px rgba(39, 201, 63, 0.11),
            0 0 90px rgba(39, 201, 63, 0.07),
            0 18px 48px rgba(0,0,0,0.60),
            inset 0 0 22px rgba(39, 201, 63, 0.05);
    }
}

        .window::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0.025), transparent 18%, transparent 82%, rgba(255,255,255,0.015));
            opacity: 1;
        }

        .window-header {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
            background: var(--panel-bg-2);
            position: relative;
            z-index: 1;
        }

        .window-body {
            flex-grow: 1;
            display: flex;
            min-height: 0;
            position: relative;
            z-index: 1;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #e4e4e7;
            font-family: var(--font);
            font-size: 12px;
            line-height: 1.6;
            resize: none;
            outline: none;
            padding: 20px;
            transition: color 0.2s ease;
        }

        #output {
            color: #f4f4f5;
        }

        textarea::placeholder {
            color: #3f3f46;
            font-size: 11px;
            text-transform: uppercase;
        }

        .window-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px 15px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.22s ease;
            text-transform: lowercase;
            font-family: var(--font);
            letter-spacing: 0.4px;
        }

        .btn:hover {
            background: var(--accent-bright);
            color: var(--bg);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.08);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn.success-flash {
            background: var(--success);
            color: #000;
            border-color: rgba(39, 201, 63, 0.35);
        }

        .counter-badge {
            font-size: 9px;
            color: var(--success);
            border: 1px solid rgba(39, 201, 63, 0.14);
            background: rgba(39, 201, 63, 0.06);
            padding: 4px 8px;
            border-radius: 999px;
            min-width: 76px;
            text-align: center;
            transition: 0.2s ease;
        }

        .counter-badge.bump {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(39, 201, 63, 0.15);
        }

        .log-area {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 11px;
            color: var(--text-dim);
            transition: color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
            animation: logIn 0.9s ease;
        }

        @keyframes logIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-area.success {
            color: var(--success);
            border-color: rgba(39, 201, 63, 0.2);
            box-shadow: 0 0 24px rgba(39, 201, 63, 0.04);
        }

        .log-area.warning {
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.2);
            box-shadow: 0 0 24px rgba(245, 158, 11, 0.04);
        }

        .log-area.error {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 24px rgba(239, 68, 68, 0.05);
        }

        .log-area.flash {
            transform: translateY(-1px);
        }

        ::selection {
            background: var(--success);
            color: #000;
        }

        textarea::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }

        textarea::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .window {
                height: 420px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .top-bar {
                font-size: 9px;
                letter-spacing: 1px;
            }

            .window {
                height: 360px;
            }

            .window-footer {
                flex-wrap: wrap;
            }

            textarea {
                padding: 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>CORE // V.7.0</div>
        <div style="color: #fff; font-weight: 700;">ULTIMATE_COMPILER</div>
        <div id="datetime">--.--.---- // --:--:--</div>
    </div>

    <div class="grid">
        <div class="window" id="input-window">
            <div class="window-header">
                <div style="font-size: 9px; opacity: 0.5;">INPUT_STREAM</div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="[ТУТОРИАЛ]:
1. СКОПИРУЙТЕ ВЕСЬ ТЕКСТ ИЗ КАРТОЧКИ ТОВАРА И УДАЛИТЕ SKU.
2. ДАЛЕЕ СКОПИРУЙТЕ НУЖНУЮ СТРОКУ ИЗ СТАТУСА ВЕЩИ."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./compile</button>
                <button class="btn" onclick="clearAll()">clear</button>
            </div>
        </div>

        <div class="window" id="output-window">
            <div class="window-header">
                <div style="font-size: 9px; opacity: 0.5;">RESULT_LIST</div>
                <div id="counter" class="counter-badge">COUNT: 0</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="[ТУТОРИАЛ]:
3. СКОПИРУЙТЕ СТОИМОСТЬ С СИМВОЛОМ 903 ₽ ИЗ КАРТОЧКИ ТОВАРА С САЙТА. 
ГОТОВАЯ СТРОКА ПОЯВИТСЯ ЗДЕСЬ."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" id="copy-btn" onclick="copyResult()">cp_to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area" id="log">> SYSTEM_READY: READY FOR DATA</div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('datetime').innerHTML =
                now.toLocaleDateString('ru-RU') + ' // ' + now.toLocaleTimeString('ru-RU');
        }

        setInterval(updateClock, 1000);
        updateClock();

        const inputArea = document.getElementById('input');
        const outputArea = document.getElementById('output');
        const logEl = document.getElementById('log');
        const counterEl = document.getElementById('counter');
        const copyBtn = document.getElementById('copy-btn');
        const outputWindow = document.getElementById('output-window');

        window.addEventListener('load', function () {
            inputArea.focus();
        });

        inputArea.addEventListener('paste', function () {
            setTimeout(processData, 150);
        });

        inputArea.addEventListener('input', function () {
            if (inputArea.value === '') {
                clearAll();
            }
        });

        inputArea.addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                processData();
            }

            if (e.key === 'Escape') {
                e.preventDefault();
                clearAll();
            }
        });

        outputArea.addEventListener('dblclick', function () {
            copyResult();
        });

        function bumpCounter() {
            counterEl.classList.add('bump');
            setTimeout(function () {
                counterEl.classList.remove('bump');
            }, 220);
        }

        function flashLog(type) {
            logEl.className = 'log-area ' + type + ' flash';
            setTimeout(function () {
                logEl.className = 'log-area ' + type;
            }, 220);
        }

function processData() {
    const fullText = inputArea.value.trim();
    if(!fullText) return;

    // Режем на блоки
    let blocks = [];
    if (fullText.includes("Идентификатор товара") || fullText.includes("Предмет")) {
        blocks = fullText.split(/(?=Идентификатор товара|Предмет:)/i).filter(b => b.trim().length > 10);
    } else {
        blocks = [fullText];
    }

    let finalResults = [];

    blocks.forEach(text => {
        // 1. ID и Стикер (10-12 цифр)
        const idMatch = text.match(/\b\d{10,12}\b/);
        const id = idMatch ? idMatch[0] : "";
        const sticker = id;

        // 2. СТАТУС (Универсальный поиск: 3 заглавные буквы, за которыми идет текст раскладки/инвентаризации)
        const statusMatch = text.match(/\b([A-Z]{3})\b(?=\s+[А-Яа-я])/);
        const status = statusMatch ? statusMatch[1] : "";

        // 3. НАИМЕНОВАНИЕ (Полное название из верхней строки)
        let name = "";
        const altMatch = text.match(/Идентификатор товара\s+\d+\s+\/\s+([^/]+)/i);
        if (altMatch) name = altMatch[1].trim();

        // 4. СТОИМОСТЬ (Строго число перед знаком ₽)
        const priceMatch = text.match(/(\d+[\s\d]*)\s*₽/);
        const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "";

        // 5. MX (ВЛАД или ЦП)
        const mxMatch = text.match(/(?:ВЛАД|ЦП|MX)[\d\.]+/i);
        const mx = mxMatch ? mxMatch[0] : "";

        // 6. BOX (Строго число после слова BOX)
        const boxMatch = text.match(/BOX\s*(\d+)/i);
        const box = boxMatch ? boxMatch[1] : "";

        if (id || name || price) {
            finalResults.push(`${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`);
        }
    });

    if (finalResults.length > 0) {
        outputArea.value = finalResults.join('\n');
        document.getElementById('counter').innerText = `COUNT: ${finalResults.length}`;
        document.getElementById('output-window').classList.add('has-output');
        logEl.innerText = `> SUCCESS: ${finalResults.length} STRINGS COMPILED`;
    }
}


        async function copyResult() {
            if (!outputArea.value) return;

            try {
                await navigator.clipboard.writeText(outputArea.value);
                copyBtn.innerText = 'copied!';
                copyBtn.classList.add('success-flash');
                logEl.innerText = '> RESULT COPIED TO BUFFER';
                logEl.className = 'log-area success';
                flashLog('success');

                setTimeout(function () {
                    copyBtn.innerText = 'cp_to_buffer';
                    copyBtn.classList.remove('success-flash');
                }, 1000);
            } catch (e) {
                logEl.innerText = '> ERROR: COPY FAILED';
                logEl.className = 'log-area error';
                flashLog('error');
            }
        }

        function clearAll() {
            inputArea.value = '';
            outputArea.value = '';
            counterEl.innerText = 'COUNT: 0';
            logEl.innerText = '> SYSTEM_RESET: READY';
            logEl.className = 'log-area';
            copyBtn.innerText = 'cp_to_buffer';
            copyBtn.classList.remove('success-flash');
            outputWindow.classList.remove('has-output');
        }
    </script>
</body>
</html>
