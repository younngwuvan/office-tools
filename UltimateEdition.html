<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --panel: #111111;
            --gold: #d4af37;
            --green: #2ecc71;
            --text: #888888;
            --border: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Эффект вспышки за окнами */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 80%);
            opacity: 0; pointer-events: none; z-index: 1;
            transition: opacity 0.15s ease;
        }

        .top-bar {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand { color: #333; }
        .main-title { color: var(--gold); letter-spacing: 12px; font-weight: 400; opacity: 0.9; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            z-index: 10;
        }

        .window {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .window-header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: #222; margin-right: 6px; }
        .dot.red { background: #442222; }

        textarea {
            width: 100%; height: 420px;
            background: transparent; border: none;
            color: #ccc; font-family: 'Inter', sans-serif;
            font-size: 11px; line-height: 1.8;
            resize: none; outline: none; padding: 25px; box-sizing: border-box;
        }

        .window-footer { padding: 15px 25px; }

        .btn {
            background: transparent; border: 1px solid #222;
            color: #555; padding: 6px 12px; font-size: 8px;
            cursor: pointer; text-transform: lowercase; transition: 0.3s;
        }
        .btn:hover { border-color: #007aff; color: #007aff; box-shadow: 0 0 10px rgba(0,122,255,0.2); }

        /* Лог в стиле твоего скрина */
        .terminal {
            width: 100%;
            max-width: 1100px;
            margin-top: 50px;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-item { color: #1a1a1a; transition: color 0.3s; }
        .log-item.active { color: var(--green); opacity: 0.8; }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="top-bar">
    <div class="brand">[ ENGINE BY VAN ]</div>
    <div class="main-title">ULTIMATE 6</div>
    <div style="color:#222">[ manual_guide ]</div>
</div>

<div class="grid">
    <div class="window">
        <div class="window-header"><div class="dot red"></div><div class="dot"></div></div>
        <textarea id="input" placeholder="..."></textarea>
        <div class="window-footer">
            <button class="btn" onclick="processData()">./run</button>
        </div>
    </div>

    <div class="window" onclick="copyResult()">
        <div class="window-header"><div class="dot red"></div><div class="dot"></div></div>
        <textarea id="output" readonly placeholder="..."></textarea>
        <div class="window-footer">
            <button class="btn" style="border-color: #004488; color: #007aff;">cp_to_buffer</button>
        </div>
    </div>
</div>

<div class="terminal" id="term">
    <div class="log-item active">> SYSTEM_READY</div>
</div>

<script>
    function addLog(text) {
        const term = document.getElementById('term');
        const entry = document.createElement('div');
        entry.className = 'log-item active';
        entry.innerHTML = `> ${text.toUpperCase()}`;
        term.prepend(entry);
        if(term.children.length > 8) term.lastChild.style.color = '#111';
    }

    function processData() {
        const raw = document.getElementById('input').value;
        if(!raw) return;
        addLog('analyzing_patterns...');
        
        setTimeout(() => {
            const id = (raw.match(/\b\d{10,11}\b/g) || [""])[0];
            const sticker = (raw.match(/\b\d{10,11}\b/g) || [""])[1] || id;
            const status = (raw.match(/\b[A-Z]{3,4}\b/) || [""])[0];
            const name = (raw.match(/Предмет\s*\n?\s*(.*?)(?=\n|\/|$)/i) || ["", ""])[1].trim();
            const price = (raw.match(/(\d+)\s*₽/) || ["", ""])[1];
            const mx = (raw.match(/(ВЛАД\d+|ЦП\d+)[^\s]*/i) || [""])[0];
            const box = (raw.match(/\b(BOX|CON)\b\s*(\d+)/i) || ["", "", ""])[2];

            document.getElementById('output').value = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`;
            addLog('compilation_success');
        }, 300);
    }

    async function copyResult() {
        const out = document.getElementById('output');
        if(!out.value) return;
        await navigator.clipboard.writeText(out.value);
        
        const f = document.getElementById('flash');
        f.style.opacity = '1';
        setTimeout(() => f.style.opacity = '0', 200);
        
        addLog('clipboard: flash_transfer_complete');
    }
</script>
</body>
</html>
