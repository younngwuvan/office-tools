<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 6.6 | ENGINE BY VAN</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel-bg: rgba(15, 15, 15, 0.9);
            --accent: #a1a1aa;
            --accent-bright: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #52525b;
            --success: #27c93f;
            --error: #ff5f56;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            color: var(--accent);
            font-family: var(--font);
            margin: 0; padding: 25px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .top-bar {
            width: 100%; max-width: 1200px; display: flex; 
            justify-content: space-between; font-size: 10px; 
            letter-spacing: 2px; margin-bottom: 20px; opacity: 0.5;
        }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 100%; max-width: 1200px; flex-grow: 1;
        }

        .window {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            height: 550px;
        }

        .window:focus-within {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255,255,255,0.02);
        }

        .window-header {
            padding: 12px 18px; display: flex; align-items: center; 
            border-bottom: 1px solid var(--border);
            justify-content: space-between; background: rgba(255,255,255,0.02);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.6; }

        .window-body { flex-grow: 1; display: flex; }

        textarea {
            width: 100%; height: 100%; background: transparent; border: none;
            color: #d4d4d8; font-family: var(--font); font-size: 12px; line-height: 1.6;
            resize: none; outline: none; padding: 20px;
        }

        .window-footer {
            padding: 12px 20px; border-top: 1px solid var(--border); 
            display: flex; gap: 10px; background: rgba(0, 0, 0, 0.2);
        }

        .btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: var(--accent); padding: 7px 15px; font-size: 10px; cursor: pointer;
            border-radius: 4px; transition: 0.2s; text-transform: lowercase;
        }

        .btn:hover { background: var(--accent-bright); color: var(--bg); }

        .log-area {
            width: 100%; max-width: 1200px; margin-top: 20px;
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 15px 20px; font-size: 11px; color: var(--text-dim);
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }

        ::selection { background: var(--success); color: #000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>CORE // ENGINE_V.6.6</div>
        <div style="color: #fff; font-weight: 700;">PRECISION_COMPILE</div>
        <div id="datetime">--.--.---- // --:--:--</div>
    </div>

    <div class="grid">
        <!-- Ввод -->
        <div class="window" id="win-in">
            <div class="window-header">
                <div class="dots">
                    <div class="dot" style="background:#ff5f56"></div>
                    <div class="dot" style="background:#ffbd2e"></div>
                    <div class="dot" style="background:#27c93f"></div>
                </div>
                <div style="font-size: 9px; opacity: 0.5;">SOURCE_STREAM</div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="Вставьте данные из чата в любом порядке..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./compile</button>
                <button class="btn" onclick="clearAll()">clear</button>
            </div>
        </div>

        <!-- Вывод -->
        <div class="window">
            <div class="window-header">
                <div style="font-size: 9px; opacity: 0.5;">REFINED_RESULT</div>
                <div style="font-size: 8px; color: var(--success); letter-spacing: 1px;">TAB_SEPARATED</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="Parsed string..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" id="copy-btn" onclick="copyResult()">cp_to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area" id="log">> SYSTEM_READY: STANDBY_MODE</div>

<script>
    // Часы
    function updateClock() {
        const now = new Date();
        document.getElementById('datetime').innerHTML = now.toLocaleDateString('ru-RU') + ' // ' + now.toLocaleTimeString('ru-RU');
    }
    setInterval(updateClock, 1000); updateClock();

    // Звуковой движок (тихие системные клики)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, dur, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');
    const logEl = document.getElementById('log');

    // Авто-запуск при вставке
    inputArea.addEventListener('paste', () => setTimeout(processData, 100));

    function processData() {
        const text = inputArea.value.trim();
        if(!text) {
            beep(150, 0.2, 0.1);
            document.getElementById('win-in').classList.add('shake');
            setTimeout(() => document.getElementById('win-in').classList.remove('shake'), 400);
            return;
        }

        // 1. Извлекаем ID и Стикер (берем ПЕРВОЕ число от 10 знаков)
        const idMatch = text.match(/\b\d{10,12}\b/);
        const id = idMatch ? idMatch[0] : "";
        const sticker = id;

        // 2. Статус (3-4 заглавные буквы)
        const statusMatch = text.match(/\b(WLI|LIO|BOX|CON|ERR|OK)\b/);
        const status = statusMatch ? statusMatch[0].toUpperCase() : "";

        // 3. Название предмета (строго после "Предмет" и до первого слеша или переноса)
        let name = "";
        const nameMatch = text.match(/Предмет\s*\n?\s*([^/\n\r\t]+)/i);
        if (nameMatch) {
            name = nameMatch[1].trim();
        } else {
            const altMatch = text.match(/Идентификатор товара\s+\d+\s+\/\s+([^/]+)/i);
            if (altMatch) name = altMatch[1].trim();
        }

        // 4. Стоимость (строго цифры перед значком ₽)
        const priceMatch = text.match(/(\d[\d\s]*)\s*₽/);
        const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "";

        // 5. MX (ВЛАД или ЦП со всеми цифрами и точками)
        const mxMatch = text.match(/(?:ВЛАД|ЦП|MX)[\d\.]+/i);
        const mx = mxMatch ? mxMatch[0] : "";

        // 6. BOX (Только если есть слово BOX. Поступление игнорируем)
        const boxMatch = text.match(/BOX\s*(\d+)/i);
        const box = boxMatch ? boxMatch[1] : "";

        // Сборка финальной строки (Разделение TAB)
        const result = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`;
        
        outputArea.value = result;

        if(id) {
            beep(800, 0.05, 0.02);
            logEl.innerText = `> SUCCESS: ${id} COMPILED`;
            outputArea.style.boxShadow = 'inset 0 0 20px rgba(39, 201, 63, 0.05)';
            setTimeout(() => outputArea.style.boxShadow = 'none', 500);
        } else {
            beep(200, 0.2, 0.1);
            logEl.innerText = `> WARNING: PRIMARY_ID_NOT_FOUND`;
        }
    }

    async function copyResult() {
        if(!outputArea.value) return;
        try {
            await navigator.clipboard.writeText(outputArea.value);
            beep(1200, 0.03, 0.02);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'copied_';
            btn.style.color = '#27c93f';
            setTimeout(() => {
                btn.innerText = 'cp_to_buffer';
                btn.style.color = '';
            }, 1000);
            logEl.innerText = '> CLIPBOARD: TRANSFER_COMPLETE';
        } catch (e) { logEl.innerText = '> ERROR: CLIPBOARD_BLOCKED'; }
    }

    function clearAll() {
        inputArea.value = ''; outputArea.value = '';
        logEl.innerText = '> SYSTEM_RESET: MEMORY_CLEARED';
        inputArea.focus();
    }

    window.onload = () => inputArea.focus();
</script>
</body>
</html>
