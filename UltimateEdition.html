<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #b7b7b7; /* Тот самый серый из скриншота */
            --win: #0d0d0d;
            --gold: #d4af37;
        }

        body {
            background: var(--bg);
            margin: 0; padding: 60px 0;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Кастомный скроллбар («палка») */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        textarea:hover::-webkit-scrollbar-thumb { background: #444; }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
        }

        .header {
            width: 1000px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 50px; font-size: 10px; letter-spacing: 2px; color: #888;
        }

        .title { color: var(--gold); font-size: 16px; letter-spacing: 12px; font-weight: 600; text-transform: uppercase; }

        .grid { display: flex; gap: 30px; width: 1000px; }

        .window {
            flex: 1; background: var(--win); height: 520px; border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .win-head {
            padding: 12px 18px; display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }

        .label { margin-left: 15px; font-size: 8px; color: #333; text-transform: uppercase; letter-spacing: 1px; }

        textarea {
            flex: 1; background: transparent; border: none; padding: 25px;
            color: #d1d1d1; font-family: 'JetBrains Mono', monospace;
            font-size: 12px; line-height: 1.8; resize: none; outline: none;
        }

        .footer { padding: 15px 25px; }

        .btn {
            background: transparent; border: 1px solid #222; color: #444;
            padding: 6px 14px; font-size: 9px; cursor: pointer; transition: 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn:hover { border-color: #444; color: #888; }
        .btn:focus { border-color: #1e3a8a; color: #1e3a8a; } /* Синяя обводка как на скрине */

        .logs { width: 1000px; margin-top: 40px; font-family: 'JetBrains Mono', monospace; font-size: 9px; line-height: 1.6; }
        .log-line { color: #1a1a1a; opacity: 0.4; }
        .log-line.active { color: #22c55e; opacity: 1; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="header">
    <div>[ ENGINE BY VAN ]</div>
    <div class="title">ULTIMATE 6</div>
    <div onclick="toggleM()" style="cursor:pointer">manual guide</div>
</div>

<div class="grid">
    <div class="window">
        <div class="win-head">
            <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
            <div class="label">source_data_telemetry</div>
        </div>
        <textarea id="in" placeholder="READY..."></textarea>
        <div class="footer"><button class="btn" onclick="run()">./run_analysis</button></div>
    </div>

    <div class="window" onclick="copy()">
        <div class="win-head">
            <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
            <div class="label">refined_output_buffer</div>
        </div>
        <textarea id="out" readonly placeholder="AWAITING..."></textarea>
        <div class="footer"><button class="btn">cp_to_buffer</button></div>
    </div>
</div>

<div class="logs" id="l">
    <div class="log-line active">> SYSTEM_READY</div>
</div>

<div id="modal" onclick="toggleM()">
    <div style="background:#111; padding:40px; border-left:3px solid var(--gold); color:#888; font-size:11px; max-width:400px; line-height:2;">
        <h3 style="color:var(--gold); margin-top:0">MANUAL</h3>
        1. Вставь данные влево.<br>2. Жми ./run_analysis.<br>3. Кликай в любое место правого окна для копирования.
    </div>
</div>

<script>
    function toggleM() { const m = document.getElementById('modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    
    function log(t) {
        const l = document.getElementById('l');
        const d = document.createElement('div');
        d.className = 'log-line active';
        d.innerHTML = '> ' + t.toUpperCase();
        l.prepend(d);
        if(l.children.length > 5) l.lastChild.remove();
        Array.from(l.children).slice(1).forEach(i => i.classList.remove('active'));
    }

    function run() {
        const txt = document.getElementById('in').value;
        if(!txt) return;
        log('analyzing...');
        setTimeout(() => {
            const nums = txt.match(/\d{10,11}/g) || [];
            const id = nums[0] || "";
            const price = (txt.match(/(\d+)\s*₽/) || ["",""])[1];
            const mx = (txt.match(/(ВЛАД\d+|ЦП\d+)/i) || [""])[0];
            document.getElementById('out').value = `${id}\t${id}\t\t\t${price}\t${mx}`;
            log('success');
        }, 300);
    }

    async function copy() {
        const v = document.getElementById('out').value;
        if(!v) return;
        await navigator.clipboard.writeText(v);
        const f = document.getElementById('flash');
        f.style.opacity = '1';
        setTimeout(() => f.style.opacity = '0', 200);
        log('copied');
    }
</script>
</body>
</html>
