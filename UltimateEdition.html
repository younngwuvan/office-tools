<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 6.3 | BATCH EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel-bg: rgba(15, 15, 15, 0.8);
            --accent: #a1a1aa;
            --accent-bright: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #52525b;
            --success: #27c93f;
            --error: #ff5f56;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            color: var(--accent);
            font-family: var(--font);
            margin: 0; padding: 25px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .top-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; margin-bottom: 20px; opacity: 0.5; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1200px; flex-grow: 1; }

        .window {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .window:focus-within { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 0 30px rgba(255,255,255,0.02); }

        .window-header {
            padding: 12px 18px; display: flex; align-items: center; border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        /* Индикаторы данных */
        .data-health { display: flex; gap: 8px; align-items: center; }
        .tag { font-size: 8px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); transition: 0.3s; }
        .tag.active { color: var(--success); border-color: var(--success); text-shadow: 0 0 5px rgba(39, 201, 63, 0.4); }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); opacity: 0.3; }

        .window-body { flex-grow: 1; position: relative; }

        textarea {
            width: 100%; height: 420px; background: transparent; border: none;
            color: #d4d4d8; font-family: var(--font); font-size: 12px; line-height: 1.6;
            resize: none; outline: none; padding: 20px;
        }

        .window-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: rgba(0, 0, 0, 0.2); }

        .btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: var(--accent); padding: 7px 15px; font-size: 10px; cursor: pointer;
            border-radius: 4px; transition: 0.2s; text-transform: lowercase;
        }

        .btn:hover { background: var(--accent-bright); color: var(--bg); }

        .log-area {
            width: 100%; max-width: 1200px; margin-top: 20px;
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 20px; font-size: 11px; color: var(--text-dim);
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% {transform: x(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>VAN_ENGINE // V.6.3</div>
        <div style="color: #fff; font-weight: 700;">BATCH_PROCESSOR</div>
        <div id="datetime">--.--.---- // --:--:--</div>
    </div>

    <div class="grid">
        <div class="window" id="win-in">
            <div class="window-header">
                <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="window-title" style="font-size: 9px; margin-left: -50px;">INPUT_STREAM</div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="Вставьте одну или несколько карточек данных..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./run_batch</button>
                <button class="btn" onclick="clearAll()">clear</button>
            </div>
        </div>

        <div class="window">
            <div class="window-header">
                <div class="data-health" id="health-bar">
                    <span class="tag" id="tag-id">ID</span>
                    <span class="tag" id="tag-name">NAME</span>
                    <span class="tag" id="tag-price">PRICE</span>
                    <span class="tag" id="tag-mx">LINK</span>
                </div>
                <div class="window-title" style="font-size: 9px;">REFINED_RESULT</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="Parsed strings will appear here..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" id="copy-btn" onclick="copyResult()">cp_to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area" id="log">SYSTEM_READY: WAITING FOR BATCH...</div>

<script>
    // Audio Engine (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, dur, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('datetime').innerHTML = now.toLocaleDateString('ru-RU') + ' // ' + now.toLocaleTimeString('ru-RU');
    }
    setInterval(updateClock, 1000); updateClock();

    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');
    const logEl = document.getElementById('log');

    // Авто-запуск при вставке
    inputArea.addEventListener('paste', () => setTimeout(processData, 100));

    function processData() {
        const text = inputArea.value.trim();
        if(!text) {
            beep(150, 0.2, 0.1);
            document.getElementById('win-in').classList.add('shake');
            setTimeout(() => document.getElementById('win-in').classList.remove('shake'), 400);
            return;
        }

        // Разделение на блоки (Batch processing)
        // Ищем начало новой карточки по слову "Предмет" или "ID:"
        const blocks = text.split(/(?=Предмет|Name|ID:|Поступление)/i).filter(b => b.trim().length > 15);
        let results = [];
        let stats = { id: false, name: false, price: false, mx: false };

        blocks.forEach(block => {
            const allNumbers = block.match(/\b\d{10,12}\b/g) || [];
            const id = allNumbers[0] || "";
            const sticker = allNumbers[1] || id;
            const statusMatch = block.match(/\b(OK|ERR|WAIT|BOX|CON|[A-Z]{3,4})\b/);
            const status = statusMatch ? statusMatch[0] : "";
            const nameMatch = block.match(/(?:Предмет|Name)\s*\n?\s*(.*?)(?=\n|\/|$)/i);
            const name = nameMatch ? nameMatch[1].trim() : "";
            const priceMatch = block.match(/(\d+[\s\d]*)\s*(?:₽|RUB)/);
            const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "";
            const mxMatch = block.match(/(?:ВЛАД|ЦП|MX)\d+[^\s]*/i);
            const mx = mxMatch ? mxMatch[0] : "";
            const boxMatch = block.match(/\b(BOX|CON)\b\s*(\d+)/i);
            const boxNum = boxMatch ? boxMatch[2] : "";

            if(id) stats.id = true;
            if(name) stats.name = true;
            if(price) stats.price = true;
            if(mx) stats.mx = true;

            results.push(`${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${boxNum}`);
        });

        // Обновление тегов здоровья данных
        document.getElementById('tag-id').className = stats.id ? 'tag active' : 'tag';
        document.getElementById('tag-name').className = stats.name ? 'tag active' : 'tag';
        document.getElementById('tag-price').className = stats.price ? 'tag active' : 'tag';
        document.getElementById('tag-mx').className = stats.mx ? 'tag active' : 'tag';

        outputArea.value = results.join('\n');
        
        if(results.length > 0) {
            beep(800, 0.1, 0.03); // Тонкий "бип" успеха
            logEl.innerText = `BATCH_SUCCESS: ${results.length} STRINGS PROCESSED`;
        } else {
            beep(200, 0.2, 0.1);
            logEl.innerText = `PROCESS_ERROR: NO PATTERNS FOUND`;
        }
    }

    async function copyResult() {
        if(!outputArea.value) return;
        try {
            await navigator.clipboard.writeText(outputArea.value);
            beep(1200, 0.05, 0.02); // Очень короткий клик
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'copied_';
            setTimeout(() => btn.innerText = 'cp_to_buffer', 1000);
            logEl.innerText = 'CLIPBOARD: DATA_TRANSFERRED';
        } catch (e) { logEl.innerText = 'ERROR: CLIPBOARD_BLOCKED'; }
    }

    function clearAll() {
        inputArea.value = ''; outputArea.value = '';
        logEl.innerText = 'SYSTEM_RESET: MEMORY_CLEARED';
        document.querySelectorAll('.tag').forEach(t => t.className = 'tag');
        inputArea.focus();
    }

    window.onload = () => inputArea.focus();
</script>
</body>
</html>
