<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6.5 | FINAL ARCHITECTURE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --accent: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --success: #27c93f;
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .window {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            outline: none;
        }

        .footer {
            padding: 10px 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 10px;
            text-transform: lowercase;
        }

        .btn:hover { background: #fff; color: #000; }

        .log {
            margin-top: 15px;
            width: 100%;
            max-width: 1100px;
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 11px;
            color: #52525b;
        }

        .active-tag { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px; font-size: 12px; font-weight: bold;">[ VAN_ENGINE // ULTIMATE_6.5 ]</div>

    <div class="container">
        <div class="window">
            <div class="header">SOURCE_DATA</div>
            <textarea id="input" placeholder="Вставьте данные в любом порядке..."></textarea>
            <div class="footer">
                <button class="btn" onclick="processData()">./compile</button>
                <button class="btn" onclick="clearAll()">clear</button>
            </div>
        </div>

        <div class="window">
            <div class="header">
                RESULT_STRING
                <div id="indicators">ID:[-] NAME:[-] PRICE:[-]</div>
            </div>
            <textarea id="output" readonly></textarea>
            <div class="footer">
                <button class="btn" id="copy-btn" onclick="copyResult()">cp_to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log" id="log">> SYSTEM READY...</div>

<script>
    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');
    const logEl = document.getElementById('log');

    inputArea.addEventListener('paste', () => setTimeout(processData, 100));

    function processData() {
        const text = inputArea.value.trim();
        if(!text) return;

        // 1. Ищем ID и Стикер (берем ПЕРВОЕ число от 10 знаков)
        const idMatch = text.match(/\b\d{10,12}\b/);
        const id = idMatch ? idMatch[0] : "";
        const sticker = id;

        // 2. Статус (3-4 буквы заглавными: WLI, LIO, BOX и т.д.)
        const statusMatch = text.match(/\b(WLI|LIO|BOX|CON|ERR|OK)\b/i);
        const status = statusMatch ? statusMatch[0].toUpperCase() : "";

        // 3. Наименование (Ищем после "Предмет" или в строке с "Идентификатор товара")
        let name = "";
        const nameRegex = /(?:Предмет|Name)\s*\n?\s*([^/\n\r]+)/i;
        const nameAltRegex = /Идентификатор товара\s+\d+\s+\/\s+([^/]+)/i;
        
        const m1 = text.match(nameRegex);
        const m2 = text.match(nameAltRegex);
        
        if (m1) name = m1[1].trim();
        else if (m2) name = m2[1].trim();

        // 4. Стоимость (цифры перед знаком ₽)
        const priceMatch = text.match(/(\d+[\s\d]*)\s*₽/);
        const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "";

        // 5. MX (ВЛАД или ЦП)
        const mxMatch = text.match(/((?:ВЛАД|ЦП|MX)[\d\.]+)/i);
        const mx = mxMatch ? mxMatch[0] : "";

        // 6. BOX (число 8-9 знаков, которое НЕ равно ID)
        let box = "";
        const allNums = text.match(/\b\d{8,12}\b/g) || [];
        box = allNums.find(n => n.length >= 8 && n !== id) || "";

        // Сборка по твоему формату: 
        // ID | Sticker | Status | Name | Price | MX | BOX
        const result = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`;
        
        outputArea.value = result;
        
        // Индикация
        document.getElementById('indicators').innerHTML = 
            `ID:[${id?'<span class="active-tag">OK</span>':'-'}] ` +
            `NAME:[${name?'<span class="active-tag">OK</span>':'-'}] ` +
            `PRICE:[${price?'<span class="active-tag">OK</span>':'-'}]`;

        logEl.innerText = id ? '> SUCCESS: DATA COMPILED' : '> WARNING: ID NOT FOUND';
    }

    async function copyResult() {
        if(!outputArea.value) return;
        await navigator.clipboard.writeText(outputArea.value);
        const btn = document.getElementById('copy-btn');
        btn.innerText = 'copied!';
        setTimeout(() => btn.innerText = 'cp_to_buffer', 1000);
    }

    function clearAll() {
        inputArea.value = '';
        outputArea.value = '';
        inputArea.focus();
    }
</script>
</body>
</html>
