<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --window: #111111;
            --gold: #b39359; /* Приглушенное золото */
            --accent-blue: #1e3a8a;
            --text: #444444;
            --input-text: #a1a1aa;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 50px;
            letter-spacing: 0.5px;
        }

        /* Заголовок как на скрине */
        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .gold { color: var(--gold); }

        .container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }

        /* Окна с мягкой тенью */
        .window {
            flex: 1;
            background: var(--window);
            height: 500px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .window-nav {
            padding: 15px;
            display: flex;
            gap: 6px;
        }

        .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #222; }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 20px 30px;
            color: var(--input-text);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            line-height: 1.8;
            resize: none;
            outline: none;
        }

        /* Кнопки как на скрине */
        .footer { padding: 20px 30px; }

        .btn {
            background: transparent;
            border: 1px solid #222;
            color: #333;
            font-size: 8px;
            padding: 6px 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-blue { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn:hover { border-color: #444; color: #666; }
        .btn-blue:hover { background: rgba(30, 58, 138, 0.1); }

        /* Лог снизу */
        .sys-ready {
            width: 100%;
            max-width: 1000px;
            margin-top: 50px;
            font-size: 9px;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        /* Эффект вспышки при копировании */
        .flash-effect {
            animation: flashAnim 0.4s ease-out;
        }

        @keyframes flashAnim {
            0% { background: #111; }
            20% { background: #1a1a1a; border-color: #333; }
            100% { background: #111; }
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="gold">Engine by Van</div>
        <div style="color: #666; font-weight: 600; letter-spacing: 10px;">Ultimate 6</div>
        <div onclick="toggleModal()" style="cursor:pointer">Manual</div>
    </div>

    <div class="container">
        <div class="window">
            <div class="window-nav"><div class="nav-dot"></div><div class="nav-dot"></div></div>
            <textarea id="input" placeholder="Input source..."></textarea>
            <div class="footer">
                <button class="btn" onclick="processData()">Run</button>
            </div>
        </div>

        <div class="window" id="outputWindow" onclick="copyResult()">
            <div class="window-nav"><div class="nav-dot"></div><div class="nav-dot"></div></div>
            <textarea id="output" readonly placeholder="Waiting..."></textarea>
            <div class="footer">
                <button class="btn btn-blue">Copy.Full</button>
            </div>
        </div>
    </div>

    <div class="sys-ready" id="status">> system_ready</div>

    <div id="modal" onclick="toggleModal()">
        <div style="max-width: 400px; line-height: 2; font-size: 10px; color: #555;">
            <span class="gold">GUIDE:</span><br>
            1. Вставьте сырые данные (ID, цена, MX) в левое окно.<br>
            2. Нажмите Run.<br>
            3. Кликните в любое место правого окна для копирования.
        </div>
    </div>

<script>
    function toggleModal() {
        const m = document.getElementById('modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function processData() {
        const text = document.getElementById('input').value;
        if(!text.trim()) return;
        
        document.getElementById('status').innerHTML = '> compiling_patterns...';
        
        setTimeout(() => {
            const allNums = text.match(/\b\d{10,11}\b/g) || [];
            const id = allNums[0] || "";
            const sticker = allNums[1] || id;
            const status = (text.match(/\b[A-Z]{3,4}\b/) || [""])[0];
            const name = (text.match(/Предмет\s*\n?\s*(.*?)(?=\n|\/|$)/i) || ["", ""])[1].trim();
            const price = (text.match(/(\d+)\s*₽/) || ["", ""])[1];
            const mx = (text.match(/(ВЛАД\d+|ЦП\d+)[^\s]*/i) || [""])[0];
            const box = (text.match(/\b(BOX|CON)\b\s*(\d+)/i) || ["", "", ""])[2];

            document.getElementById('output').value = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${box}`;
            document.getElementById('status').innerHTML = '> analysis_complete';
        }, 300);
    }

    async function copyResult() {
        const val = document.getElementById('output').value;
        if(!val) return;
        
        await navigator.clipboard.writeText(val);
        
        // Благородная вспышка только на окна
        const win = document.getElementById('outputWindow');
        win.classList.add('flash-effect');
        document.getElementById('status').innerHTML = '> clipboard_updated';
        
        setTimeout(() => win.classList.remove('flash-effect'), 400);
    }
</script>
</body>
</html>
