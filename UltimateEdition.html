<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 6 | ENGINE BY VAN</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel-bg: #141414;
            --accent: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #52525b;
            --input-bg: #0a0a0a;
            --glow: rgba(161, 161, 170, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Верхняя панель */
        .top-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* Окна */
        .window {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .window:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--glow);
        }

        .window-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.8; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .window-title {
            margin-left: 20px;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-body { padding: 0; flex-grow: 1; }

        textarea {
            width: 100%;
            height: 380px;
            background: transparent;
            border: none;
            color: #d4d4d8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Футер и кнопки */
        .window-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 6px 14px;
            font-size: 10px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s all;
            text-transform: lowercase;
            outline: none;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn:active { transform: translateY(1px); }

        /* Лог-панель */
        .log-area {
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
            height: 80px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #status-text::before {
            content: "> ";
            color: var(--accent);
        }

        #status-text.working::after {
            content: "_";
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Эффект ошибки */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        ::selection { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>[ ENGINE BY VAN ]</div>
        <div style="font-weight: 700; color: #fff;">ULTIMATE 6.1</div>
        <div>[ AUTO_MODE ] <span id="datetime">--.--.---- // --:--:--</span></div>
    </div>

    <div class="grid">
        <div class="window" id="input-window">
            <div class="window-header">
                <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
                <div class="window-title">SOURCE_INPUT <span style="opacity:0.4">(CTRL+ENTER)</span></div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="Вставьте данные для дешифровки..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./run_analysis</button>
                <button class="btn" onclick="clearInput()">clear</button>
            </div>
        </div>

        <div class="window">
            <div class="window-header">
                <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
                <div class="window-title">REFINED_OUTPUT</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="copyResult()">cp to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area">
        <div id="status-text">SYSTEM_READY: STANDBY...</div>
    </div>

<script>
    // Обновление времени
    function updateClock() {
        const now = new Date();
        const d = now.toLocaleDateString('ru-RU');
        const t = now.toLocaleTimeString('ru-RU');
        document.getElementById('datetime').innerHTML = `${d} // ${t}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Логирование с эффектом «печатания»
    const statusEl = document.getElementById('status-text');
    function log(msg) {
        statusEl.classList.remove('working');
        statusEl.innerText = msg.toUpperCase();
        void statusEl.offsetWidth; // Триггер рефлоу
        statusEl.classList.add('working');
    }

    // Очистка
    function clearInput() {
        document.getElementById('input').value = '';
        document.getElementById('output').value = '';
        log('Memory_Cleared');
    }

    // Горячие клавиши
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            processData();
        }
    });

    // Обработка данных
    function processData() {
        const inputArea = document.getElementById('input');
        const outputArea = document.getElementById('output');
        const text = inputArea.value.trim();

        if(!text) { 
            log('Error: No source detected');
            document.getElementById('input-window').classList.add('shake');
            setTimeout(() => document.getElementById('input-window').classList.remove('shake'), 400);
            return; 
        }

        log('Analyzing patterns...');
        outputArea.value = ''; // Очищаем перед выводом

        // Имитация "раздумий" для солидности
        setTimeout(() => {
            try {
                const allNumbers = text.match(/\b\d{10,12}\b/g) || [];
                const id = allNumbers[0] || "NULL";
                const sticker = allNumbers[1] || id;
                
                const statusMatch = text.match(/\b(OK|ERR|WAIT|BOX|CON|[A-Z]{3,4})\b/);
                const status = statusMatch ? statusMatch[0] : "NONE";
                
                const nameMatch = text.match(/(?:Предмет|Name)\s*\n?\s*(.*?)(?=\n|\/|$)/i);
                const name = nameMatch ? nameMatch[1].trim() : "UNKNOWN_OBJECT";
                
                const priceMatch = text.match(/(\d+[\s\d]*)\s*(?:₽|RUB)/);
                const price = priceMatch ? priceMatch[1].replace(/\s/g, '') : "0";
                
                const mxMatch = text.match(/(?:ВЛАД|ЦП|MX)\d+[^\s]*/i);
                const mx = mxMatch ? mxMatch[0] : "NO_LINK";
                
                const boxMatch = text.match(/\b(BOX|CON)\b\s*(\d+)/i);
                const boxNum = boxMatch ? boxMatch[2] : "-";

                const result = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${boxNum}`;
                
                // Эффект появления результата
                outputArea.value = result;
                log('Success: String compiled');
                
            } catch (err) {
                log('Analysis_Failed: Check source format');
            }
        }, 500);
    }

    // Улучшенное копирование
    async function copyResult() {
        const output = document.getElementById('output');
        if(!output.value) {
            log('Error: Nothing to copy');
            return;
        }
        try {
            await navigator.clipboard.writeText(output.value);
            log('Clipboard: Data_Transferred');
            
            // Визуальный отклик на кнопке
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'done';
            setTimeout(() => btn.innerText = originalText, 1000);
        } catch (err) { 
            log('Error: Buffer_Access_Denied'); 
        }
    }

    // Автофокус при загрузке
    window.onload = () => document.getElementById('input').focus();
</script>
</body>
</html>
