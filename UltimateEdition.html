
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE 6 | ENGINE BY VAN</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel-bg: #141414;
            --accent: #a1a1aa;
            --border: rgba(255, 255, 255, 0.05);
            --text-dim: #52525b;
            --input-bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Верхняя панель навигации */
        .top-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* Стиль окна в духе macOS */
        .window {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .window-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .dots {
            display: flex;
            gap: 6px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .window-title {
            margin-left: 20px;
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .window-body { padding: 20px; flex-grow: 1; }

        textarea {
            width: 100%;
            height: 350px;
            background: var(--input-bg);
            border: none;
            color: #d4d4d8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            padding: 10px;
            box-sizing: border-box;
        }

        .window-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
        }

        /* Кнопки как на скриншоте */
        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: lowercase;
        }

        .btn:hover {
            border-color: #52525b;
            color: #fff;
            background: rgba(255,255,255,0.02);
        }

        /* Нижний лог-панель */
        .log-area {
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
            height: 120px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
            color: var(--text-dim);
        }

        #datetime { color: var(--accent); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>[ ENGINE BY VAN ]</div>
        <div style="font-weight: 600;">ULTIMATE 6</div>
        <div>[ MANUAL ] <span id="datetime">--.--.---- // --:--:--</span></div>
    </div>

    <div class="grid">
        <!-- Левое окно -->
        <div class="window">
            <div class="window-header">
                <div class="dots">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div class="window-title">SOURCE_INPUT</div>
            </div>
            <div class="window-body">
                <textarea id="input" placeholder="Вставьте данные (Карточка + История + Цена)..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="processData()">./run_analysis</button>
                <button class="btn" onclick="document.getElementById('input').value=''">clear</button>
            </div>
        </div>

        <!-- Правое окно -->
        <div class="window">
            <div class="window-header">
                <div class="dots">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div class="window-title">REFINED_OUTPUT</div>
            </div>
            <div class="window-body">
                <textarea id="output" readonly placeholder="Ожидание дешифровки..."></textarea>
            </div>
            <div class="window-footer">
                <button class="btn" onclick="copyResult()">cp to_buffer</button>
            </div>
        </div>
    </div>

    <div class="log-area" id="status-text">
        SYSTEM_READY: STANDBY MODE...
    </div>

<script>
    function updateClock() {
        const now = new Date();
        const d = now.toLocaleDateString('ru-RU').replace(/\./g, '.');
        const t = now.toLocaleTimeString('ru-RU');
        document.getElementById('datetime').innerHTML = `${d} // ${t}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function log(msg) {
        document.getElementById('status-text').innerHTML = `> ${msg.toUpperCase()}`;
    }

    function processData() {
        const text = document.getElementById('input').value;
        if(!text.trim()) { log('Error: No source data'); return; }

        log('Compiling patterns...');

        setTimeout(() => {
            const allNumbers = text.match(/\b\d{10,11}\b/g) || [];
            const id = allNumbers[0] || "";
            const sticker = allNumbers[1] || id;
            const statusMatch = text.match(/\b[A-Z]{3,4}\b/);
            const status = statusMatch ? statusMatch[0] : "";
            const nameMatch = text.match(/Предмет\s*\n?\s*(.*?)(?=\n|\/|$)/i);
            const name = nameMatch ? nameMatch[1].trim() : "";
            const priceMatch = text.match(/(\d+)\s*₽/);
            const price = priceMatch ? priceMatch[1] : "";
            const mxMatch = text.match(/(ВЛАД\d+|ЦП\d+)[^\s]*/i);
            const mx = mxMatch ? mxMatch[0] : "";
            const boxMatch = text.match(/\b(BOX|CON)\b\s*(\d+)/i);
            const boxNum = boxMatch ? boxMatch[2] : "";

            const result = `${id}\t${sticker}\t${status}\t${name}\t${price}\t${mx}\t${boxNum}`;
            document.getElementById('output').value = result;
            log('Analysis_Success: String generated');
        }, 300);
    }

    async function copyResult() {
        const output = document.getElementById('output');
        if(!output.value) return;
        try {
            await navigator.clipboard.writeText(output.value);
            log('Clipboard: Transfer_Complete');
        } catch (err) { log('Error: Clipboard access denied'); }
    }
</script>
</body>
</html>
